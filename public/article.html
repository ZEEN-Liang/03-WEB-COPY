<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章 · 论坛广场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1814;
    --ink-muted: #5c5850;
    --ink-faint: #a8a49e;
    --paper: #f5f2ec;
    --rule: #d8d3ca;
    --accent: #c0392b;
    --gold: #b8963e;
    --card-bg: #faf8f4;
  }

  html, body {
    min-height: 100%;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(26,24,20,0.03) 28px, rgba(26,24,20,0.03) 29px);
    pointer-events: none; z-index: 0;
  }

  /* ── Masthead ── */
  .masthead { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--accent); z-index: 100; }

  /* ── Nav ── */
  .nav {
    position: sticky; top: 4px; z-index: 90;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: stretch;
    padding: 0 48px; height: 56px;
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--ink); text-decoration: none;
    display: flex; align-items: center; margin-right: 36px;
  }
  .nav-logo em { font-style: italic; color: var(--accent); }

  .nav-links { display: flex; align-items: stretch; flex: 1; }

  .nav-link {
    display: flex; align-items: center;
    padding: 0 16px;
    font-size: 13px; font-weight: 400; color: var(--ink-muted);
    text-decoration: none; letter-spacing: 0.04em;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--ink); font-weight: 500; border-bottom-color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
  .nav-user { font-size: 13px; font-weight: 300; color: var(--ink-muted); }
  .nav-user span { color: var(--ink); font-weight: 500; }
  .nav-btn {
    font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
    padding: 6px 14px; border-radius: 3px; cursor: pointer;
    transition: all 0.2s; text-decoration: none; border: 1px solid var(--rule);
    color: var(--ink-muted); background: none; display: flex; align-items: center;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn-primary { background: var(--ink); color: #f5f2ec; border-color: var(--ink); }
  .nav-btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #f5f2ec; }

  /* ── Loading / Error states ── */
  .state-wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh;
    font-size: 14px; font-weight: 300; color: var(--ink-faint);
    text-align: center; gap: 16px;
  }
  .state-icon { font-size: 36px; opacity: 0.35; }
  .state-back { font-size: 13px; color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(192,57,43,0.3); transition: border-color 0.2s; }
  .state-back:hover { border-color: var(--accent); }

  /* ── Article layout ── */
  .article-wrap {
    position: relative; z-index: 1;
    max-width: 720px; margin: 0 auto;
    padding: 60px 24px 100px;
    animation: fadeUp 0.5s ease both;
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 300; color: var(--ink-faint);
    margin-bottom: 40px;
  }
  .breadcrumb a { color: var(--ink-faint); text-decoration: none; transition: color 0.2s; }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb-sep { font-size: 10px; }

  /* Header */
  .article-header { margin-bottom: 48px; }

  .article-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }

  .author-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ink); color: #f5f2ec;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; flex-shrink: 0;
    font-family: 'DM Serif Display', serif;
  }

  .author-info { display: flex; flex-direction: column; gap: 2px; }
  .author-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .article-meta a:hover .author-name { color: var(--accent); }
  .article-meta a { transition: opacity 0.2s; }
  .article-meta a:hover { opacity: 0.85; }
  .article-date { font-size: 12px; font-weight: 300; color: var(--ink-faint); }

  .article-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 600; line-height: 1.4;
    color: var(--ink); margin-bottom: 20px;
    letter-spacing: -0.3px;
  }

  .article-rule {
    display: flex; align-items: center; gap: 12px;
    margin-top: 28px;
  }
  .article-rule-line { flex: 1; height: 1px; background: var(--rule); }
  .article-rule-mark { color: var(--accent); font-size: 14px; flex-shrink: 0; }

  /* Body */
  .article-body {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px; font-weight: 400;
    line-height: 2.1; color: var(--ink-muted);
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 60px;
    letter-spacing: 0.02em;
  }

  .article-body:empty::before {
    content: '作者没有留下正文内容。';
    font-style: italic; color: var(--ink-faint);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
  }

  /* ── Image gallery ── */
  .gallery { margin-bottom: 48px; }

  .gallery-title {
    font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-faint);
    margin-bottom: 16px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .gallery-item {
    aspect-ratio: 4/3;
    overflow: hidden; border-radius: 4px;
    border: 1px solid var(--rule);
    cursor: pointer; position: relative;
    background: var(--card-bg);
  }

  .gallery-item img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.35s ease, opacity 0.2s;
  }
  .gallery-item:hover img { transform: scale(1.04); }

  .gallery-item-overlay {
    position: absolute; inset: 0;
    background: rgba(26,24,20,0); display: flex;
    align-items: center; justify-content: center;
    transition: background 0.2s;
    color: #fff; font-size: 22px; opacity: 0;
  }
  .gallery-item:hover .gallery-item-overlay { background: rgba(26,24,20,0.3); opacity: 1; }

  /* ── Text file attachments ── */
  .files-section { margin-bottom: 48px; }

  .files-title {
    font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-faint);
    margin-bottom: 16px;
  }

  .file-list { display: flex; flex-direction: column; gap: 8px; }

  .file-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--card-bg); border: 1px solid var(--rule); border-radius: 4px;
    text-decoration: none; color: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .file-item:hover { border-color: var(--accent); background: #fff; }

  .file-icon {
    width: 40px; height: 40px; border-radius: 3px; flex-shrink: 0;
    background: var(--paper); border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--ink-muted); text-transform: uppercase;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; font-weight: 400; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 12px; font-weight: 300; color: var(--ink-faint); margin-top: 3px; }

  .file-dl {
    font-size: 12px; color: var(--ink-faint); padding: 5px 12px;
    border: 1px solid var(--rule); border-radius: 2px;
    transition: color 0.15s, border-color 0.15s; white-space: nowrap;
    flex-shrink: 0;
  }
  .file-item:hover .file-dl { color: var(--accent); border-color: var(--accent); }

  /* ── Article footer ── */
  .article-footer {
    padding-top: 40px;
    border-top: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }

  .footer-back {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 400; color: var(--ink-muted);
    text-decoration: none; transition: color 0.2s;
  }
  .footer-back:hover { color: var(--accent); }
  .footer-back-arrow { font-size: 16px; transition: transform 0.2s; }
  .footer-back:hover .footer-back-arrow { transform: translateX(-4px); }

  .footer-meta { font-size: 12px; font-weight: 300; color: var(--ink-faint); text-align: right; }

  /* ── Article stats bar ── */
  .article-stats {
    display: flex; align-items: center; gap: 20px;
    padding: 14px 0; margin-bottom: 40px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .stat-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 300; color: var(--ink-faint);
  }
  .stat-item-icon { font-size: 14px; }

  /* ── Comments ── */
  .comments-section { margin-top: 60px; }

  .comments-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 32px; padding-bottom: 16px;
    border-bottom: 1.5px solid var(--rule);
  }
  .comments-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px; font-weight: 600; color: var(--ink);
  }
  .comments-count { font-size: 13px; color: var(--ink-faint); font-weight: 300; }

  /* Comment input */
  .comment-form { margin-bottom: 40px; }

  .comment-input-row { display: flex; gap: 12px; align-items: flex-start; }

  .comment-avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: var(--ink); color: #f5f2ec;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 15px; font-weight: 500;
    margin-top: 2px;
  }
  .comment-avatar.guest { background: var(--rule); color: var(--ink-faint); font-size: 18px; }

  .comment-input-wrap { flex: 1; }

  .comment-textarea {
    width: 100%; padding: 12px 14px; min-height: 80px; resize: vertical;
    background: #fff; border: 1.5px solid var(--rule); border-radius: 4px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 300;
    color: var(--ink); outline: none; line-height: 1.7;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .comment-textarea::placeholder { color: var(--ink-faint); }
  .comment-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(192,57,43,0.07); }
  .comment-textarea:disabled { background: var(--paper); cursor: not-allowed; }

  .comment-form-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px;
  }
  .comment-hint { font-size: 12px; color: var(--ink-faint); font-weight: 300; }
  .comment-hint a { color: var(--accent); text-decoration: none; }

  .btn-comment {
    padding: 9px 24px; background: var(--ink); color: #f5f2ec;
    border: none; border-radius: 3px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 13px; font-weight: 500;
    letter-spacing: 0.06em; cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.1s;
  }
  .btn-comment::before { content: ''; position: absolute; inset: 0; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.28s ease; }
  .btn-comment:hover::before { transform: scaleX(1); }
  .btn-comment span { position: relative; z-index: 1; }
  .btn-comment:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-comment.loading span { opacity: 0; }
  .btn-comment.loading::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 16px; height: 16px; border: 2px solid rgba(245,242,236,0.3); border-top-color: #f5f2ec; border-radius: 50%; animation: spin 0.7s linear infinite; z-index: 2; }

  /* Comment list */
  .comment-list { display: flex; flex-direction: column; gap: 0; }

  .comment-meta {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .comment-author { font-size: 13px; font-weight: 500; color: var(--ink); text-decoration: none; }
  .comment-author:hover { color: var(--accent); }
  a.comment-author { color: var(--ink); }
  .comment-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--rule); }
  .comment-date { font-size: 12px; font-weight: 300; color: var(--ink-faint); }
  .comment-text { font-size: 14px; font-weight: 300; line-height: 1.8; color: var(--ink-muted); white-space: pre-wrap; word-break: break-word; }

  .no-comments { padding: 40px 0; text-align: center; font-size: 13px; font-weight: 300; color: var(--ink-faint); }

  .comment-item { position: relative; display: flex; gap: 12px; padding: 20px 0; border-bottom: 1px solid var(--rule); }
  .comment-item:last-child { border-bottom: none; }
  .comment-body { flex: 1; min-width: 0; }
  .comment-delete {
    display: none;
    position: absolute; top: 22px; right: 0;
    background: none; border: 1px solid var(--rule); border-radius: 3px;
    padding: 3px 9px; font-size: 11px; font-family: inherit;
    color: var(--ink-faint); cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .comment-delete:hover { color: var(--accent); border-color: var(--accent); background: rgba(192,57,43,0.05); }
  .is-admin .comment-delete { display: block; }

  /* ── Reply ── */
  .reply-indent {
    margin-left: 50px; padding-left: 16px;
    border-left: 2px solid var(--rule);
  }
  .reply-item { padding: 16px 0 0; }
  .reply-item:last-child { padding-bottom: 0; }

  .reply-to-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--accent); font-weight: 400;
    margin-bottom: 4px; letter-spacing: 0.02em;
  }

  .reply-box {
    display: none;
    margin-top: 10px; margin-left: 50px;
    padding: 14px 16px;
    background: var(--card-bg); border: 1.5px solid var(--rule);
    border-radius: 6px; animation: fadeUp 0.2s ease;
  }
  .reply-box.open { display: block; }

  .reply-box-header {
    font-size: 12px; color: var(--ink-muted); margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .reply-box-to { font-weight: 500; color: var(--accent); }

  .reply-textarea {
    width: 100%; padding: 9px 12px; min-height: 70px; resize: none;
    background: #fff; border: 1.5px solid var(--rule); border-radius: 4px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 13px; font-weight: 300;
    color: var(--ink); outline: none; line-height: 1.7;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .reply-textarea::placeholder { color: var(--ink-faint); }
  .reply-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(192,57,43,0.07); }

  .reply-box-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px;
  }
  .reply-char-count { font-size: 11px; color: var(--ink-faint); }
  .reply-box-btns { display: flex; gap: 8px; }

  .btn-reply-cancel {
    padding: 6px 14px; background: none;
    border: 1px solid var(--rule); border-radius: 3px;
    font-size: 12px; font-family: inherit; color: var(--ink-muted);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-reply-cancel:hover { border-color: var(--ink-faint); color: var(--ink); }

  .btn-reply-submit {
    padding: 6px 16px; background: var(--ink); color: #f5f2ec;
    border: none; border-radius: 3px;
    font-size: 12px; font-family: inherit; font-weight: 500;
    cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.1s;
  }
  .btn-reply-submit::before { content: ''; position: absolute; inset: 0; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.25s; }
  .btn-reply-submit:hover::before { transform: scaleX(1); }
  .btn-reply-submit span { position: relative; z-index: 1; }
  .btn-reply-submit:disabled { opacity: 0.55; cursor: not-allowed; }

  .comment-reply-trigger {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 6px; margin-left: 2px;
    font-size: 12px; color: var(--ink-faint); cursor: pointer;
    background: none; border: none; font-family: inherit;
    padding: 2px 6px; border-radius: 3px;
    transition: color 0.15s, background 0.15s;
  }
  .comment-reply-trigger:hover { color: var(--accent); background: rgba(192,57,43,0.06); }

  /* ── Like button ── */
  .like-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; border-radius: 20px; cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif; font-size: 13px; font-weight: 400;
    border: 1.5px solid var(--rule); background: none; color: var(--ink-muted);
    transition: all 0.2s; user-select: none;
  }
  .like-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(192,57,43,0.05); }
  .like-btn.liked { border-color: var(--accent); color: var(--accent); background: rgba(192,57,43,0.08); }
  .like-btn.liked .like-heart { transform: scale(1.25); }
  .like-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .like-heart { font-size: 15px; transition: transform 0.2s; display: inline-block; }
  .like-count { font-size: 13px; min-width: 10px; }

  .comment-like-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 12px; cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif; font-size: 11px; font-weight: 400;
    border: 1px solid var(--rule); background: none; color: var(--ink-faint);
    transition: all 0.18s; user-select: none; margin-top: 8px;
  }
  .comment-like-btn:hover { border-color: var(--accent); color: var(--accent); }
  .comment-like-btn.liked { border-color: var(--accent); color: var(--accent); background: rgba(192,57,43,0.06); }
  .comment-like-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── Lightbox ── */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(26,24,20,0.92);
    align-items: center; justify-content: center;
    padding: 24px;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; animation: fadeIn 0.2s ease; }
  .lightbox img {
    max-width: 100%; max-height: 90vh;
    object-fit: contain; border-radius: 2px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.4);
    cursor: default;
  }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px;
    color: rgba(255,255,255,0.6); font-size: 28px; cursor: pointer;
    transition: color 0.15s; line-height: 1; background: none; border: none;
  }
  .lightbox-close:hover { color: #fff; }
  .lightbox-caption {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.5);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 80%;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 600px) {
    .nav { padding: 0 16px; }
    .nav-user { display: none; }
    .article-wrap { padding: 40px 16px 60px; }
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .article-footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="masthead"></div>

<!-- Nav -->
<nav class="nav">
  <a href="/forum.html" class="nav-logo">论<em>坛</em>广场</a>
  <div class="nav-links">
    <a href="/forum.html" class="nav-link">广 场</a>
    <a href="/post.html" class="nav-link">投 稿</a>
  </div>
  <div class="nav-right" id="nav-right"></div>
</nav>

<!-- Content injected by JS -->
<div id="app"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightboxDirect()">×</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
// ── Nav auth state ──────────────────────────────────────────
const token    = localStorage.getItem('token');
const username = localStorage.getItem('username');
const navRight = document.getElementById('nav-right');

if (token && username) {
  navRight.innerHTML = `
    <div class="nav-user">你好，<span>${username}</span></div>
    <a href="/profile.html" class="nav-btn">我的主页</a>
    <a href="/post.html" class="nav-btn nav-btn-primary">写投稿</a>
    <button class="nav-btn" onclick="logout()">退出</button>
  `;
} else {
  navRight.innerHTML = `
    <a href="/" class="nav-btn">登录</a>
    <a href="/" class="nav-btn nav-btn-primary">注册</a>
  `;
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  window.location.href = '/';
}

// ── Helpers ─────────────────────────────────────────────────
function formatDate(str) {
  const d = new Date(str.replace(' ', 'T') + 'Z');
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function isImage(mime) { return mime && mime.startsWith('image/'); }

function getFileExt(name) {
  return name.split('.').pop().toUpperCase().slice(0, 4) || 'FILE';
}

function getAvatarLetter(name) {
  return (name || '?')[0].toUpperCase();
}

// ── Load article ────────────────────────────────────────────
async function loadArticle() {
  const app = document.getElementById('app');
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  // No id in URL
  if (!id) {
    app.innerHTML = `
      <div class="state-wrap">
        <div class="state-icon">✦</div>
        <div>未指定文章 ID</div>
        <a href="/forum.html" class="state-back">← 返回广场</a>
      </div>`;
    return;
  }

  // Loading state
  app.innerHTML = `
    <div class="state-wrap">
      <div class="state-icon" style="animation: pulse 1.2s ease infinite">◌</div>
      <div>正在加载文章…</div>
    </div>`;

  try {
    const res = await fetch(`/api/posts/${id}`);

    if (res.status === 404) {
      app.innerHTML = `
        <div class="state-wrap">
          <div class="state-icon">◻</div>
          <div>文章不存在或已被删除</div>
          <a href="/forum.html" class="state-back">← 返回广场</a>
        </div>`;
      return;
    }

    const post = await res.json();

    // Update page title
    document.title = post.title + ' · 论坛广场';

    // Separate images and other files
    const images = (post.attachments || []).filter(a => isImage(a.mimetype));
    const files  = (post.attachments || []).filter(a => !isImage(a.mimetype));

    // Build gallery HTML
    let galleryHtml = '';
    if (images.length > 0) {
      const items = images.map(img => `
        <div class="gallery-item" onclick="openLightbox('/uploads/${img.filename}', '${img.originalname}')">
          <img src="/uploads/${img.filename}" alt="${img.originalname}" loading="lazy">
          <div class="gallery-item-overlay">⊕</div>
        </div>
      `).join('');
      galleryHtml = `
        <div class="gallery">
          <div class="gallery-title">图片 · ${images.length} 张</div>
          <div class="gallery-grid">${items}</div>
        </div>
      `;
    }

    // Build file list HTML
    let filesHtml = '';
    if (files.length > 0) {
      const items = files.map(f => `
        <a class="file-item" href="/uploads/${f.filename}" target="_blank" download="${f.originalname}">
          <div class="file-icon">${getFileExt(f.originalname)}</div>
          <div class="file-info">
            <div class="file-name">${f.originalname}</div>
            <div class="file-size">${formatSize(f.size)}</div>
          </div>
          <span class="file-dl">下载</span>
        </a>
      `).join('');
      filesHtml = `
        <div class="files-section">
          <div class="files-title">文件附件 · ${files.length} 个</div>
          <div class="file-list">${items}</div>
        </div>
      `;
    }

    // Render full article
    app.innerHTML = `
      <div class="article-wrap">

        <div class="breadcrumb">
          <a href="/forum.html">广场</a>
          <span class="breadcrumb-sep">›</span>
          <span>${post.title}</span>
        </div>

        <div class="article-header">
          <div class="article-meta">
            <a href="/profile.html?user=${encodeURIComponent(post.username)}"
               style="display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer"
               title="查看主页">
              ${avatarHtml(post.nickname || post.username, post.avatar, 40)}
              <div class="author-info">
                <div class="author-name">${post.nickname || post.username}</div>
              </div>
            </a>
            <div class="article-date" style="margin-left:4px">${formatDate(post.created_at)}</div>
          </div>

          <h1 class="article-title">${post.title}</h1>

          <div class="article-rule">
            <div class="article-rule-line"></div>
            <div class="article-rule-mark">✦</div>
            <div class="article-rule-line"></div>
          </div>
        </div>

        <div class="article-body">${post.content ? escapeHtml(post.content) : ''}</div>

        ${galleryHtml}
        ${filesHtml}

        <div class="article-stats">
          <div class="stat-item"><span class="stat-item-icon">👁</span>${post.view_count || 0} 次阅读</div>
          <div class="stat-item"><span class="stat-item-icon">💬</span>${post.comment_count || 0} 条评论</div>
          <div class="stat-item"><span class="stat-item-icon">📅</span>${formatDate(post.created_at)}</div>
          <div style="margin-left:auto">
            <button class="like-btn ${post.already_liked ? 'liked' : ''}"
              id="post-like-btn"
              onclick="toggleLike('post', ${id}, this)"
              ${token ? '' : 'disabled title="登录后才能点赞"'}>
              <span class="like-heart">${post.already_liked ? '♥' : '♡'}</span>
              <span class="like-count" id="post-like-count">${post.like_count || 0}</span>
              <span>赞</span>
            </button>
          </div>
        </div>

        <div class="comments-section" id="comments-section"></div>

        <div class="article-footer">
          <a href="/forum.html" class="footer-back">
            <span class="footer-back-arrow">←</span>
            返回广场
          </a>
          <div class="footer-meta">
            第 ${post.id} 篇投稿<br>
            由 ${post.nickname || post.username} 发布
          </div>
        </div>

      </div>
    `;

    // Build comments section now that DOM is ready
    buildCommentsSection(id);

  } catch (e) {
    app.innerHTML = `
      <div class="state-wrap">
        <div class="state-icon">!</div>
        <div>加载失败，请确认服务器正在运行</div>
        <a href="/forum.html" class="state-back">← 返回广场</a>
      </div>`;
  }
}


// Build avatar HTML — shows photo if available, else initial letter
function avatarHtml(username, avatarUrl, size = 36) {
  const letter = (username || '?')[0].toUpperCase();
  const style  = `width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--ink);color:#f5f2ec;font-family:'DM Serif Display',serif;font-size:${Math.round(size*0.42)}px;font-weight:500;`;
  const url = (avatarUrl && avatarUrl !== '0' && avatarUrl !== 0 && String(avatarUrl).startsWith('/')) ? avatarUrl : null;
  if (url) {
    return `<div style="${style}padding:0"><img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='${letter}';this.parentElement.style.padding=''" alt="${letter}"></div>`;
  }
  return `<div style="${style}">${letter}</div>`;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Lightbox ─────────────────────────────────────────────────
function openLightbox(src, caption) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e.target === document.getElementById('lightbox')) closeLightboxDirect();
}

function closeLightboxDirect() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightboxDirect();
});

// ── Comments ────────────────────────────────────────────────
let currentPostId = null;

function formatDateFull(str) {
  const d = new Date(str.replace(' ', 'T') + 'Z');
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' })
    + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function buildCommentsSection(postId) {
  currentPostId = postId;
  const section = document.getElementById('comments-section');
  if (!section) return;

  // Avatar — fetch own avatar from server if not cached
  const myAv = window._myAvatar !== undefined ? window._myAvatar : null;
  const myAvatarEl = token && username ? avatarHtml(username, myAv, 36)
    : `<div style="width:36px;height:36px;border-radius:50%;background:var(--rule);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink-faint);flex-shrink:0">?</div>`;

  // Input area
  const inputHtml = token
    ? `<div class="comment-input-row">
        ${myAvatarEl}
        <div class="comment-input-wrap">
          <textarea class="comment-textarea" id="comment-textarea"
            placeholder="写下你的想法…" maxlength="500"></textarea>
          <div class="comment-form-footer">
            <div class="comment-hint"><span id="char-count">0</span> / 500</div>
            <button class="btn-comment" id="btn-comment"><span>发表评论</span></button>
          </div>
        </div>
      </div>`
    : `<div class="comment-input-row">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--rule);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink-faint);flex-shrink:0">?</div>
        <div class="comment-input-wrap">
          <textarea class="comment-textarea" placeholder="登录后才能发表评论" disabled></textarea>
          <div class="comment-form-footer">
            <div class="comment-hint">请 <a href="/">登录</a> 后发表评论</div>
          </div>
        </div>
      </div>`;

  section.innerHTML = `
    <div class="comments-header">
      <div class="comments-title">评论</div>
      <div class="comments-count" id="comments-count"></div>
    </div>
    <div class="comment-form">${inputHtml}</div>
    <div id="comment-list" class="comment-list"></div>
  `;

  // Bind events after DOM is built
  const ta = document.getElementById('comment-textarea');
  if (ta) {
    ta.addEventListener('input', () => {
      const cc = document.getElementById('char-count');
      if (cc) cc.textContent = ta.value.length;
    });
    // Submit on Ctrl+Enter
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitComment();
    });
  }

  const btn = document.getElementById('btn-comment');
  if (btn) btn.addEventListener('click', submitComment);

  // Load existing comments
  loadComments();
}

// ── Like handlers ────────────────────────────────────────────
async function toggleLike(target, targetId, btn) {
  if (!token) return;
  btn.disabled = true;
  try {
    const res  = await fetch('/api/like', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ target, target_id: targetId })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || '操作失败'); return; }
    const heart = btn.querySelector('.like-heart');
    const count = btn.querySelector('.like-count');
    if (data.liked) {
      btn.classList.add('liked');
      heart.textContent = '♥';
    } else {
      btn.classList.remove('liked');
      heart.textContent = '♡';
    }
    count.textContent = data.count;
  } catch(e) {
    alert('操作失败，请重试');
  } finally {
    btn.disabled = false;
  }
}

async function toggleCommentLike(btn) {
  if (!token) return;
  const commentId = Number(btn.dataset.id);
  btn.disabled = true;
  try {
    const res  = await fetch('/api/like', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ target: 'comment', target_id: commentId })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || '操作失败'); return; }
    const countEl = btn.querySelector('.clc-' + commentId);
    if (data.liked) {
      btn.classList.add('liked');
      btn.querySelector('span').textContent = '♥';
    } else {
      btn.classList.remove('liked');
      btn.querySelector('span').textContent = '♡';
    }
    if (countEl) countEl.textContent = data.count;
  } catch(e) {
    alert('操作失败，请重试');
  } finally {
    btn.disabled = false;
  }
}

async function deleteComment(commentId, btn) {
  if (!confirm('确认删除这条评论？')) return;
  btn.disabled = true;
  btn.textContent = '删除中…';
  try {
    const res  = await fetch(`/api/admin/comments/${commentId}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || '删除失败'); btn.disabled = false; btn.textContent = '删除'; return; }
    // Animate out then reload
    const item = btn.closest('.comment-item');
    item.style.transition = 'opacity 0.2s, transform 0.2s';
    item.style.opacity = '0';
    item.style.transform = 'translateX(12px)';
    setTimeout(() => loadComments(), 220);
  } catch(e) {
    alert('删除失败，请重试');
    btn.disabled = false;
    btn.textContent = '删除';
  }
}

// Active reply state
let replyTarget = null; // { id, username }

function openReplyBox(commentId, authorName) {
  // Close any open reply box first
  document.querySelectorAll('.reply-box.open').forEach(b => b.classList.remove('open'));
  if (replyTarget && replyTarget.id === commentId && replyTarget.username === authorName) {
    replyTarget = null; return; // toggle off same target
  }
  replyTarget = { id: commentId, username: authorName };
  const box = document.getElementById('reply-box-' + commentId);
  if (!box) return;
  // Update header to show current reply target
  const toEl = box.querySelector('.reply-box-to');
  if (toEl) toEl.textContent = authorName;
  // Update submit button target
  const submitBtn = box.querySelector('.btn-reply-submit');
  if (submitBtn) {
    submitBtn.onclick = () => submitReply(commentId, authorName);
  }
  box.classList.add('open');
  const ta = box.querySelector('.reply-textarea');
  if (ta) { ta.value = ''; ta.focus(); box.querySelector('.reply-char-count').textContent = '0 / 500'; }
}

function closeReplyBox(commentId) {
  const box = document.getElementById('reply-box-' + commentId);
  if (box) box.classList.remove('open');
  if (replyTarget && replyTarget.id === commentId) replyTarget = null;
}

async function submitReply(commentId, authorName) {
  if (!token) { window.location.href = '/'; return; }
  const box = document.getElementById('reply-box-' + commentId);
  const ta  = box.querySelector('.reply-textarea');
  const btn = box.querySelector('.btn-reply-submit');
  const content = ta.value.trim();
  if (!content) return;
  btn.disabled = true;
  try {
    const res = await fetch(`/api/posts/${currentPostId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ content, parent_id: commentId, reply_to: authorName })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || '回复失败'); return; }
    closeReplyBox(commentId);
    await loadComments();
    // Scroll to new reply
    const newEl = document.querySelector(`[data-comment-id="${data.id}"]`);
    if (newEl) newEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch(e) {
    alert('发送失败，请重试');
  } finally {
    btn.disabled = false;
  }
}

// rootId: the top-level comment id this reply belongs to (for reply box targeting)
function buildCommentEl(cm, adminMode, isReply = false, rootId = null) {
  const div = document.createElement('div');
  div.className = (isReply ? 'comment-item reply-item' : 'comment-item') + (adminMode ? ' is-admin' : '');
  div.dataset.commentId = cm.id;

  const cmDisplayName = cm.display_name || cm.username || '匿名';
  const cmProfileUrl  = cm.username === 'admin' ? null : '/profile.html?user=' + encodeURIComponent(cm.username);

  const likedClass  = cm.already_liked ? ' liked' : '';
  const likedHeart  = cm.already_liked ? '♥' : '♡';
  const canLike     = token ? '' : 'disabled title="登录后才能点赞"';
  const replyToHtml = cm.reply_to
    ? `<div class="reply-to-tag">↩ 回复 ${escapeHtml(cm.reply_to)}</div>` : '';

  const triggerRootId = isReply ? (rootId || cm.parent_id) : cm.id;
  const replyTrigger  = token
    ? `<button class="comment-reply-trigger"
         data-cid="${triggerRootId}"
         data-author="${escapeHtml(cmDisplayName)}"
         data-username="${escapeHtml(cm.username)}">↩ 回复</button>`
    : '';
  const cmAvatarBlock = cmProfileUrl
    ? `<a href="${cmProfileUrl}" style="display:block;flex-shrink:0;text-decoration:none" title="查看主页">${avatarHtml(cmDisplayName, cm.avatar, 36)}</a>`
    : avatarHtml(cmDisplayName, cm.avatar, 36);

  div.innerHTML = `
    ${cmAvatarBlock}
    <div class="comment-body">
      ${replyToHtml}
      <div class="comment-meta">
        ${cmProfileUrl
          ? `<a href="${cmProfileUrl}" class="comment-author" style="text-decoration:none;color:inherit" title="查看主页">${escapeHtml(cmDisplayName)}</a>`
          : `<span class="comment-author">${escapeHtml(cmDisplayName)}</span>`
        }
        <span class="comment-dot"></span>
        <span class="comment-date">${formatDateFull(cm.created_at)}</span>
      </div>
      <div class="comment-text">${escapeHtml(cm.content)}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <button class="comment-like-btn${likedClass}" data-id="${cm.id}" ${canLike}>
          <span>${likedHeart}</span>
          <span class="clc-${cm.id}">${cm.like_count || 0}</span>
        </button>
        ${replyTrigger}
      </div>
    </div>
    <button class="comment-delete" data-id="${cm.id}" title="删除此评论">删除</button>
  `;
  return div;
}

async function loadComments() {
  const list    = document.getElementById('comment-list');
  const countEl = document.getElementById('comments-count');
  if (!list) return;

  try {
    const res      = await fetch(`/api/posts/${currentPostId}/comments`, {
      headers: token ? { 'Authorization': 'Bearer ' + token } : {}
    });
    const comments = await res.json();
    const adminMode = localStorage.getItem('isAdmin') === 'true';

    // Total = all comments including replies
    if (countEl) countEl.textContent = comments.length ? `${comments.length} 条` : '';

    if (comments.length === 0) {
      list.innerHTML = '<div class="no-comments">还没有评论，来留下第一条吧</div>';
      return;
    }

    list.innerHTML = '';

    // Separate top-level and replies
    const topLevel = comments.filter(cm => !cm.parent_id);
    const replies  = comments.filter(cm =>  cm.parent_id);

    topLevel.forEach((cm, i) => {
      const wrap = document.createElement('div');
      wrap.style.animationDelay = (i * 0.04) + 's';

      const cmEl = buildCommentEl(cm, adminMode, false);
      wrap.appendChild(cmEl);

      // Reply box (only for logged-in users)
      if (token) {
        const box = document.createElement('div');
        box.className = 'reply-box';
        box.id = 'reply-box-' + cm.id;
        const cmDN = cm.display_name || cm.username || '匿名';
        box.innerHTML = `
          <div class="reply-box-header">
            <span>回复 <span class="reply-box-to">${escapeHtml(cmDN)}</span></span>
          </div>
          <textarea class="reply-textarea" maxlength="500" placeholder="写下你的回复…"></textarea>
          <div class="reply-box-footer">
            <span class="reply-char-count">0 / 500</span>
            <div class="reply-box-btns">
              <button class="btn-reply-cancel" onclick="closeReplyBox(${cm.id})">取消</button>
              <button class="btn-reply-submit" onclick="submitReply(${cm.id}, '${escapeHtml(cmDN)}')"><span>发送回复</span></button>
            </div>
          </div>
        `;
        // Char counter
        box.querySelector('.reply-textarea').addEventListener('input', e => {
          box.querySelector('.reply-char-count').textContent = e.target.value.length + ' / 500';
        });
        // Ctrl+Enter submit
        box.querySelector('.reply-textarea').addEventListener('keydown', e => {
          if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitReply(cm.id, cm.display_name || cm.username || '匿名');
        });
        wrap.appendChild(box);
      }

      // Replies to this comment (all hang under cm.id as root)
      const myReplies = replies.filter(r => r.parent_id == cm.id);
      if (myReplies.length > 0) {
        const indent = document.createElement('div');
        indent.className = 'reply-indent';
        myReplies.forEach(r => indent.appendChild(buildCommentEl(r, adminMode, true, cm.id)));
        wrap.appendChild(indent);
      }

      list.appendChild(wrap);
    });

    // Bind like buttons
    if (token) {
      list.querySelectorAll('.comment-like-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleCommentLike(btn));
      });
    }

    // Bind reply triggers (data-cid = root comment id, data-author = person being replied to)
    list.querySelectorAll('.comment-reply-trigger').forEach(btn => {
      btn.addEventListener('click', () => {
        openReplyBox(Number(btn.dataset.cid), btn.dataset.author);
      });
    });

    // Bind delete buttons
    if (adminMode) {
      list.querySelectorAll('.comment-delete').forEach(btn => {
        btn.addEventListener('click', () => deleteComment(Number(btn.dataset.id), btn));
      });
    }

    // Re-open reply box if was active before reload
    if (replyTarget) {
      const box = document.getElementById('reply-box-' + replyTarget.id);
      if (box) box.classList.add('open');
    }

  } catch(e) { console.error('加载评论失败', e); }
}

async function submitComment() {
  if (!token) { window.location.href = '/'; return; }
  const ta  = document.getElementById('comment-textarea');
  const btn = document.getElementById('btn-comment');
  if (!ta || !btn) return;
  const content = ta.value.trim();
  if (!content) return;

  btn.classList.add('loading'); btn.disabled = true;
  try {
    const res  = await fetch(`/api/posts/${currentPostId}/comments`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || '评论失败');
      return;
    }
    // Clear input
    ta.value = '';
    const cc = document.getElementById('char-count');
    if (cc) cc.textContent = '0';
    // Reload comments
    await loadComments();
    // Scroll to bottom of list
    const list = document.getElementById('comment-list');
    if (list && list.lastElementChild) {
      list.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  } catch(e) {
    alert('发送失败，请重试');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── Init ─────────────────────────────────────────────────────
window._myAvatar = null;
if (token && username) {
  fetch('/api/profile/' + encodeURIComponent(username))
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (d) window._myAvatar = d.avatar || null; })
    .catch(() => {});
}
loadArticle();
</script>
</body>
