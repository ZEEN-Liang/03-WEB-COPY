<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 论坛广场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="masthead"></div>

<nav class="nav">
  <a href="/admin.html" class="nav-logo">风<em class="char-lan">蓝</em>轻音部<span class="nav-badge">管理后台</span></a>
  <div class="nav-links">
    <a href="/admin.html" class="nav-link active" id="nav-posts">投稿管理</a>
    <a href="#" class="nav-link" id="nav-music" onclick="showMusicPanel();return false;">曲库管理</a>
    <a href="#" class="nav-link" id="nav-danmaku" onclick="showDanmakuPanel();return false;">弹幕管理</a>
    <a href="/forum.html" class="nav-link" target="_blank">查看广场 ↗</a>
  </div>
  <div class="nav-right">
    <div class="nav-user">管理员：<span id="nav-admin-name"></span></div>
    <button class="nav-btn" onclick="logout()">退出登录</button>
  </div>
</nav>

<div class="page">

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-label">全部投稿</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">待审核</div><div class="stat-value pending" id="s-pending">—</div></div>
    <div class="stat-card"><div class="stat-label">已发布</div><div class="stat-value published" id="s-published">—</div></div>
    <div class="stat-card"><div class="stat-label">已隐藏</div><div class="stat-value hidden" id="s-hidden">—</div></div>
    <div class="stat-card"><div class="stat-label">注册用户</div><div class="stat-value" id="s-users">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="posts-toolbar">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all"    onclick="setFilter('all',this)">全部</button>
      <button class="filter-tab"        data-filter="pending"  onclick="setFilter('pending',this)">待审核</button>
      <button class="filter-tab"        data-filter="published" onclick="setFilter('published',this)">已发布</button>
      <button class="filter-tab"        data-filter="hidden"   onclick="setFilter('hidden',this)">已隐藏</button>
    </div>
    <div class="toolbar-right">
      <span class="count-label" id="list-count"></span>
      <button class="act-btn act-publish" style="padding:6px 16px" onclick="loadAll()">↻ 刷新</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:44px">#</th>
          <th>标题 / 作者</th>
          <th style="width:100px">附件</th>
          <th style="width:110px">状态</th>
          <th style="width:130px">提交时间</th>
          <th style="width:240px">操作</th>
        </tr>
      </thead>
      <tbody id="post-tbody"></tbody>
    </table>
  </div>

</div>

<!-- Music management panel -->
<div class="music-panel" id="music-panel" style="max-width:860px;margin:0 auto;padding:0 24px 80px">
  <div class="music-upload-card">
    <h3>上传新曲目</h3>
    <div class="music-upload-row">
      <div class="music-field">
        <label>曲目名称 *</label>
        <input type="text" id="m-title" placeholder="曲目名称" style="width:180px">
      </div>
      <div class="music-field">
        <label>艺术家</label>
        <input type="text" id="m-artist" placeholder="艺术家 / 乐队" style="width:150px">
      </div>
      <div class="music-field">
        <label>音频文件 (MP3/FLAC/WAV)</label>
        <input type="file" id="m-file" accept=".mp3,.flac,.wav,.ogg,.aac,audio/*">
      </div>
      <button class="act-btn act-publish" style="padding:8px 20px;height:36px;align-self:flex-end" onclick="uploadTrack()">上 传</button>
    </div>
    <div id="m-toast" style="margin-top:10px;font-size:12px;display:none"></div>
  </div>
  <div class="music-track-list" id="m-track-list">
    <div class="music-empty">加载中…</div>
  </div>
</div>

<!-- Danmaku management panel -->
<div class="music-panel" id="danmaku-panel" style="max-width:860px;margin:0 auto;padding:0 24px 80px">
  <div class="toolbar" style="margin-bottom:16px">
    <div class="toolbar-right" style="margin-left:auto">
      <span class="count-label" id="dm-count"></span>
      <button class="act-btn act-publish" style="padding:6px 16px" onclick="loadDanmakuList()">↻ 刷新</button>
    </div>
  </div>
  <div class="table-wrap">
    <table id="dm-table">
      <thead>
        <tr>
          <th style="width:44px">#</th>
          <th>内容</th>
          <th style="width:120px">颜色</th>
          <th style="width:140px">发送者</th>
          <th style="width:150px">时间</th>
          <th style="width:80px">操作</th>
        </tr>
      </thead>
      <tbody id="dm-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Preview Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-meta" id="drawer-meta"></div>
        <div class="drawer-title" id="drawer-title"></div>
      </div>
      <button class="drawer-close" onclick="closeDrawerDirect()">×</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-content" id="drawer-content"></div>
      <div id="drawer-attachments"></div>
    </div>
    <div class="drawer-footer">
      <button class="drawer-act-btn drawer-publish" id="df-publish" onclick="drawerAction('published')">✓ 发布</button>
      <button class="drawer-act-btn drawer-hide"    id="df-hide"    onclick="drawerAction('hidden')">隐藏</button>
      <button class="drawer-act-btn drawer-delete"  id="df-delete"  onclick="drawerAction('delete')">删除</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirm-icon"></div>
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-sub" id="confirm-sub"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">取消</button>
      <button class="confirm-ok" id="confirm-ok">确认</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="script/admin.posts.js"></script>
<script src="script/admin.music.js"></script>
<script src="script/admin.danmaku.js"></script>

</body>
</html>
