<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 风蓝轻音部</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink:#1a1814;--ink-muted:#5c5850;--ink-faint:#a8a49e;--paper:#f5f2ec;--rule:#d8d3ca;--accent:#c0392b;--gold:#b8963e;--card-bg:#faf8f4; }
  html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--paper);color:var(--ink);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(26,24,20,.03) 28px,rgba(26,24,20,.03) 29px),repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(26,24,20,.015) 28px,rgba(26,24,20,.015) 29px);pointer-events:none;z-index:0;}
  .masthead{position:fixed;top:0;left:0;right:0;height:4px;background:var(--accent);z-index:10;}
  .layout{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;height:100vh;}
  .left-panel{display:flex;flex-direction:column;justify-content:center;padding:80px 64px;border-right:1px solid var(--rule);animation:fadeUp .7s ease both;}
  .publication-name{font-family:'DM Serif Display',serif;font-size:clamp(36px,4vw,52px);line-height:1.1;letter-spacing:-.5px;margin-bottom:12px;}
  .publication-name em{font-style:normal;color:var(--accent);}
  .char-lan{color:#4a8fc4;text-shadow:0 0 14px rgba(74,143,196,.7);}
  .tagline{font-size:13px;font-weight:300;letter-spacing:.15em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:48px;}
  .divider-line{width:48px;height:2px;background:var(--accent);margin-bottom:36px;}
  .feature-items{display:flex;flex-direction:column;gap:18px;}
  .feature-item{display:flex;align-items:flex-start;gap:14px;}
  .feature-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:7px;flex-shrink:0;}
  .feature-text{font-size:14px;font-weight:300;color:var(--ink-muted);line-height:1.7;}
  .vol-info{margin-top:60px;font-size:11px;letter-spacing:.12em;color:var(--ink-faint);text-transform:uppercase;}
  .right-panel{display:flex;align-items:center;justify-content:center;padding:80px 64px;background:var(--card-bg);}
  .form-card{width:100%;max-width:380px;animation:fadeUp .7s .15s ease both;}
  .tab-row{display:flex;border-bottom:1.5px solid var(--rule);margin-bottom:40px;}
  .tab-btn{flex:1;background:none;border:none;padding:12px 0 14px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:400;color:var(--ink-faint);cursor:pointer;position:relative;transition:color .2s;letter-spacing:.05em;}
  .tab-btn::after{content:'';position:absolute;bottom:-1.5px;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .25s ease;}
  .tab-btn.active{color:var(--ink);font-weight:500;}
  .tab-btn.active::after{transform:scaleX(1);}
  .form-section{display:none;}
  .form-section.active{display:block;animation:fadeUp .3s ease both;}
  .form-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;margin-bottom:6px;}
  .form-subtitle{font-size:13px;font-weight:300;color:var(--ink-muted);margin-bottom:32px;line-height:1.6;}
  .field-group{margin-bottom:22px;}
  .field-label{display:block;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;}
  .field-input{width:100%;padding:11px 14px;background:#fff;border:1.5px solid var(--rule);border-radius:3px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:300;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
  .field-input::placeholder{color:var(--ink-faint);font-weight:300;}
  .field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,57,43,.08);}
  .field-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
  .remember-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:300;color:var(--ink-muted);cursor:pointer;user-select:none;}
  .remember-check{width:14px;height:14px;border:1.5px solid var(--rule);border-radius:2px;appearance:none;-webkit-appearance:none;cursor:pointer;position:relative;transition:border-color .15s,background .15s;}
  .remember-check:checked{background:var(--accent);border-color:var(--accent);}
  .remember-check:checked::after{content:'';position:absolute;top:1px;left:3px;width:5px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(42deg);}
  .forgot-link{font-size:12px;font-weight:300;color:var(--ink-faint);text-decoration:none;transition:color .2s;}
  .forgot-link:hover{color:var(--accent);}
  .terms-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:28px;}
  .terms-check{width:14px;height:14px;border:1.5px solid var(--rule);border-radius:2px;appearance:none;-webkit-appearance:none;cursor:pointer;position:relative;flex-shrink:0;margin-top:2px;transition:border-color .15s,background .15s;}
  .terms-check:checked{background:var(--accent);border-color:var(--accent);}
  .terms-check:checked::after{content:'';position:absolute;top:1px;left:3px;width:5px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(42deg);}
  .terms-text{font-size:12px;font-weight:300;color:var(--ink-muted);line-height:1.6;}
  .terms-text a{color:var(--accent);text-decoration:none;}
  .btn-primary{width:100%;padding:13px;background:var(--ink);color:#f5f2ec;border:none;border-radius:3px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;letter-spacing:.08em;cursor:pointer;position:relative;overflow:hidden;transition:background .2s,transform .1s;}
  .btn-primary::before{content:'';position:absolute;inset:0;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
  .btn-primary:hover::before{transform:scaleX(1);}
  .btn-primary span{position:relative;z-index:1;}
  .btn-primary:active{transform:scale(.985);}
  .btn-primary:disabled{cursor:not-allowed;opacity:.7;}
  .btn-primary.loading span{opacity:0;}
  .btn-primary.loading::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border:2px solid rgba(245,242,236,.3);border-top-color:#f5f2ec;border-radius:50%;animation:spin .7s linear infinite;z-index:2;}
  .toast{margin-top:16px;padding:10px 14px;border-radius:3px;font-size:12px;display:none;}
  .toast.show{display:block;animation:fadeUp .2s ease;}
  .toast.success{background:#f0faf4;color:#2d6a4f;border:1px solid #b7e4c7;}
  .toast.error{background:#fdf2f2;color:#922b21;border:1px solid #f5b7b1;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  @media(max-width:768px){.layout{grid-template-columns:1fr}.left-panel{display:none}.right-panel{padding:60px 32px}}
</style>
</head>
<body>
<div class="masthead"></div>
<div class="layout">
  <div class="left-panel">
    <div class="publication-name">风<em class="char-lan">蓝</em><br>轻音部</div>
    <div class="tagline">Community · Forum · Exchange</div>
    <div class="divider-line"></div>
    <div class="feature-items">
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">上传文章、文本与图片，与社区共享你的观点与创作</div></div>
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">参与讨论，结识志同道合的读者与作者</div></div>
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">关注感兴趣的用户，打造属于你的阅读圈子</div></div>
    </div>
    <div class="vol-info">风蓝轻音部 &nbsp;·&nbsp; 一个个瞬间积累起来就是一辈子</div>
  </div>
  <div class="right-panel">
    <div class="form-card">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">登 录</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">注 册</button>
      </div>
      <div class="form-section active" id="section-login">
        <div class="form-title">欢迎回来</div>
        <div class="form-subtitle">登录以继续阅读与发布内容</div>
        <div class="field-group">
          <label class="field-label" for="login-account">账号</label>
          <input class="field-input" type="text" id="login-account" placeholder="邮箱或用户名" autocomplete="username">
        </div>
        <div class="field-group">
          <label class="field-label" for="login-password">密码</label>
          <input class="field-input" type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="field-meta">
          <label class="remember-label"><input type="checkbox" class="remember-check" id="remember"> 记住我</label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>
        <button class="btn-primary" id="btn-login" onclick="handleLogin()"><span>登 录</span></button>
        <div class="toast" id="toast-login"></div>
      </div>
      <div class="form-section" id="section-register">
        <div class="form-title">创建账户</div>
        <div class="form-subtitle">加入社区，开始你的第一篇发布</div>
        <div class="field-group">
          <label class="field-label" for="reg-username">用户名</label>
          <input class="field-input" type="text" id="reg-username" placeholder="3–16 位，字母数字下划线" autocomplete="username">
        </div>
        <div class="field-group">
          <label class="field-label" for="reg-email">邮箱</label>
          <input class="field-input" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-label" for="reg-password">密码</label>
          <input class="field-input" type="password" id="reg-password" placeholder="至少 8 位" autocomplete="new-password">
        </div>
        <div class="field-group">
          <label class="field-label" for="reg-confirm">确认密码</label>
          <input class="field-input" type="password" id="reg-confirm" placeholder="再次输入密码" autocomplete="new-password">
        </div>
        <div class="terms-row">
          <input type="checkbox" class="terms-check" id="terms-check">
          <div class="terms-text">我已阅读并同意 <a href="#">服务条款</a> 与 <a href="#">隐私政策</a></div>
        </div>
        <button class="btn-primary" id="btn-register" onclick="handleRegister()"><span>注 册</span></button>
        <div class="toast" id="toast-register"></div>
      </div>
    </div>
  </div>
</div>
<script>
var _t=localStorage.getItem('token'),_u=localStorage.getItem('username'),_a=localStorage.getItem('isAdmin')==='true';
if(_t&&_u){window.location.href=_a?'/admin.html':'/forum.html';}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.form-section').forEach(function(s){s.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('section-'+tab).classList.add('active');
}
function showToast(id,msg,type){var t=document.getElementById(id);t.textContent=msg;t.className='toast '+type+' show';}
function setLoading(btn,on){btn.classList.toggle('loading',on);btn.disabled=on;}
async function handleLogin(){
  var account=document.getElementById('login-account').value.trim();
  var password=document.getElementById('login-password').value;
  var btn=document.getElementById('btn-login');
  if(!account){showToast('toast-login','请输入账号','error');return;}
  if(!password){showToast('toast-login','请输入密码','error');return;}
  setLoading(btn,true);
  try{
    var res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account,password})});
    var data=await res.json();
    if(!res.ok){showToast('toast-login',data.error||'登录失败','error');}
    else{
      localStorage.setItem('token',data.token);
      localStorage.setItem('username',data.username);
      localStorage.setItem('isAdmin',data.isAdmin?'true':'false');
      window.location.href=data.isAdmin?'/admin.html':'/forum.html';
    }
  }catch(e){showToast('toast-login','无法连接服务器，请确认后端已启动','error');}
  finally{setLoading(btn,false);}
}
async function handleRegister(){
  var username=document.getElementById('reg-username').value.trim();
  var email=document.getElementById('reg-email').value.trim();
  var password=document.getElementById('reg-password').value;
  var confirm=document.getElementById('reg-confirm').value;
  var terms=document.getElementById('terms-check').checked;
  var btn=document.getElementById('btn-register');
  if(username.length<3){showToast('toast-register','用户名至少 3 位','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showToast('toast-register','邮箱格式不正确','error');return;}
  if(password.length<8){showToast('toast-register','密码至少 8 位','error');return;}
  if(password!==confirm){showToast('toast-register','两次密码不一致','error');return;}
  if(!terms){showToast('toast-register','请同意服务条款','error');return;}
  setLoading(btn,true);
  try{
    var res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    var data=await res.json();
    if(!res.ok){showToast('toast-register',data.error||'注册失败','error');}
    else{
      localStorage.setItem('token',data.token);
      localStorage.setItem('username',data.username);
      localStorage.setItem('isAdmin','false');
      window.location.href='/forum.html';
    }
  }catch(e){showToast('toast-register','无法连接服务器，请确认后端已启动','error');}
  finally{setLoading(btn,false);}
}
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  document.getElementById('section-login').classList.contains('active')?handleLogin():handleRegister();
});
</script>
</body>
</html>
