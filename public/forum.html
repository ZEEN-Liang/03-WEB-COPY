<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广场 · 论坛广场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #152033;
    --ink-muted: #3d5470;
    --ink-faint: #8fa8c4;
    --paper: #f0f5fb;
    --rule: #ccd8e8;
    --accent: #2e7ab5;
    --gold: #4a9fd4;
    --card-bg: #f6f9fd;
  }

  html, body {
    min-height: 100%;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(21,32,51,0.03) 28px, rgba(21,32,51,0.03) 29px);
    pointer-events: none; z-index: 0;
  }

  /* ── Masthead ── */
  .masthead { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--accent); z-index: 100; }

  /* ── Nav ── */
  .nav {
    position: sticky; top: 4px; z-index: 90;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: stretch;
    padding: 0 48px;
    height: 56px;
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--ink); text-decoration: none;
    display: flex; align-items: center;
    margin-right: 36px;
  }
  .nav-logo em { font-style: italic; color: var(--accent); }

  .nav-links { display: flex; align-items: stretch; flex: 1; }

  .nav-link {
    display: flex; align-items: center;
    padding: 0 16px;
    font-size: 13px; font-weight: 400; color: var(--ink-muted);
    text-decoration: none; letter-spacing: 0.04em;
    position: relative;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active {
    color: var(--ink); font-weight: 500;
    border-bottom-color: var(--accent);
  }

  .nav-right {
    display: flex; align-items: center; gap: 16px;
    margin-left: auto;
  }

  .nav-user { font-size: 13px; font-weight: 300; color: var(--ink-muted); }
  .nav-user span { color: var(--ink); font-weight: 500; }

  .nav-btn {
    font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
    padding: 6px 16px; border-radius: 3px; cursor: pointer;
    transition: all 0.2s; text-decoration: none;
    display: flex; align-items: center;
  }
  .nav-btn-primary {
    background: var(--ink); color: #f5f2ec; border: none;
  }
  .nav-btn-primary:hover { background: var(--accent); }
  .nav-btn-outline {
    background: none; color: var(--ink-muted);
    border: 1px solid var(--rule);
  }
  .nav-btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Page ── */
  .page {
    position: relative; z-index: 1;
    max-width: 1160px; margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .page-body {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 36px;
    align-items: start;
  }

  .page-main { min-width: 0; }

  /* ── Sidebar ── */
  .sidebar {
    position: sticky; top: 72px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .sidebar-card {
    background: var(--card-bg); border: 1px solid var(--rule);
    border-radius: 6px; overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .sidebar-head {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--rule);
    font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-muted);
  }
  .sidebar-head-icon { font-size: 13px; }

  /* Announcement */
  .sidebar-announce {
    padding: 14px 16px;
    font-size: 13px; font-weight: 300; color: var(--ink-muted);
    line-height: 1.8; white-space: pre-wrap; word-break: break-word;
  }
  .sidebar-announce:empty::before { content: '暂无公告'; color: var(--ink-faint); font-style: italic; }

  /* Hot / Latest posts */
  .sidebar-post-list { display: flex; flex-direction: column; }
  .sidebar-post-item {
    display: flex; flex-direction: column; gap: 4px;
    padding: 11px 16px; border-bottom: 1px solid var(--rule);
    cursor: pointer; transition: background 0.15s; text-decoration: none; color: inherit;
  }
  .sidebar-post-item:last-child { border-bottom: none; }
  .sidebar-post-item:hover { background: var(--paper); }
  .sidebar-post-title {
    font-size: 13px; font-weight: 400; color: var(--ink); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    transition: color 0.15s;
  }
  .sidebar-post-item:hover .sidebar-post-title { color: var(--accent); }
  .sidebar-post-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 300; color: var(--ink-faint);
  }
  .sidebar-post-stat { display: flex; align-items: center; gap: 3px; }

  /* Tag cloud */
  .sidebar-tags {
    padding: 12px 16px 14px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  @media (max-width: 860px) {
    .page-body { grid-template-columns: 1fr; }
    .sidebar { position: static; }
  }

  /* ── Page header ── */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 40px; padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }

  .page-header-left {}
  .page-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px;
  }
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px; line-height: 1.1; color: var(--ink);
  }
  .page-title em { font-style: italic; color: var(--accent); }

  .post-count {
    font-size: 12px; font-weight: 300; color: var(--ink-faint);
    letter-spacing: 0.06em;
  }

  /* ── Loading / empty ── */
  .state-msg {
    text-align: center; padding: 80px 0;
    font-size: 14px; font-weight: 300; color: var(--ink-faint);
    animation: fadeUp 0.4s ease;
  }
  .state-msg .icon { font-size: 32px; margin-bottom: 16px; opacity: 0.4; }
  .state-msg p { margin-bottom: 20px; }
  .state-msg a {
    font-size: 13px; color: var(--accent); text-decoration: none;
    border-bottom: 1px solid rgba(46,122,181,0.3);
    transition: border-color 0.2s;
  }
  .state-msg a:hover { border-color: var(--accent); }

  /* ── Post list ── */
  .post-list {
    display: flex; flex-direction: column; gap: 0;
  }

  .post-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    padding: 24px 0;
    border-bottom: 1px solid var(--rule);
    text-decoration: none; color: inherit;
    cursor: pointer;
    transition: background 0.15s;
    animation: fadeUp 0.4s ease both;
    position: relative;
  }

  .post-item::before {
    content: '';
    position: absolute;
    left: -24px; right: -24px; top: 0; bottom: 0;
    background: rgba(21,32,51,0.02);
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 4px;
  }
  .post-item:hover::before { opacity: 1; }

  .post-item:first-child { border-top: none; }

  .post-main {}

  .post-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .post-author {
    font-size: 12px; font-weight: 500; color: var(--accent);
    letter-spacing: 0.04em;
  }
  .post-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--rule); }
  .post-date { font-size: 12px; font-weight: 300; color: var(--ink-faint); }

  .post-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px; font-weight: 600;
    color: var(--ink); line-height: 1.5;
    margin-bottom: 8px;
    transition: color 0.15s;
  }
  .post-item:hover .post-title { color: var(--accent); }

  .post-excerpt {
    font-size: 13px; font-weight: 300;
    color: var(--ink-muted); line-height: 1.8;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-footer {
    display: flex; align-items: center; gap: 12px;
    margin-top: 12px;
  }

  .post-tag {
    font-size: 11px; font-weight: 400; letter-spacing: 0.08em;
    padding: 3px 8px; border-radius: 2px;
    background: var(--paper); border: 1px solid var(--rule);
    color: var(--ink-muted);
    display: flex; align-items: center; gap: 5px;
  }
  .post-tag.has-files { border-color: var(--gold); color: var(--gold); background: rgba(74,159,212,0.06); }

  .post-stat {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 300; color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .post-stat-icon { font-size: 12px; opacity: 0.7; }

  .post-arrow {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; align-self: center;
    color: var(--ink-faint); font-size: 18px;
    transition: color 0.2s, transform 0.2s;
  }
  .post-item:hover .post-arrow { color: var(--accent); transform: translateX(4px); }

  /* ── Tag pills (colors handled inline via tagPillHtml) ── */
  .post-tag-pill { transition: opacity 0.15s; }
  .post-tag-pill:hover { opacity: 0.8; }

  /* ── Sort bar ── */
  .sort-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
  }
  .sort-tabs {
    display: flex; gap: 2px;
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 6px; padding: 3px;
  }
  .sort-tab {
    padding: 6px 14px; border: none; border-radius: 4px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 12px; font-weight: 400;
    color: var(--ink-muted); background: none; cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.02em; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .sort-tab:hover { color: var(--ink); }
  .sort-tab.active {
    background: var(--card-bg); color: var(--ink); font-weight: 500;
    box-shadow: 0 1px 3px rgba(21,32,51,0.08);
  }
  .sort-tab .sort-icon { font-size: 13px; }

  .sort-info {
    font-size: 12px; font-weight: 300; color: var(--ink-faint);
    white-space: nowrap;
  }

  /* Highlight the sorted stat in each post item */
  .post-stat.highlight { color: var(--accent); font-weight: 400; }
  .post-stat.highlight .post-stat-icon { opacity: 1; }

  /* ── Modal overlay ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(21,32,51,0.5);
    align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card-bg);
    border-radius: 6px;
    width: 100%; max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
    position: relative;
  }

  .modal-header {
    padding: 32px 36px 24px;
    border-bottom: 1px solid var(--rule);
    position: sticky; top: 0;
    background: var(--card-bg); z-index: 1;
  }
  .modal-eyebrow {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-author-name { color: var(--accent); font-weight: 500; }
  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px; font-weight: 600; line-height: 1.5; color: var(--ink);
  }
  .modal-close {
    position: absolute; top: 20px; right: 20px;
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--ink-faint); padding: 6px 10px;
    border-radius: 4px; transition: color 0.15s, background 0.15s;
    line-height: 1;
  }
  .modal-close:hover { color: var(--ink); background: var(--paper); }

  .modal-body { padding: 28px 36px 36px; }

  .modal-content {
    font-size: 15px; font-weight: 300; line-height: 2;
    color: var(--ink-muted); white-space: pre-wrap;
    margin-bottom: 28px;
  }
  .modal-content:empty { display: none; }

  /* Attachments in modal */
  .modal-attachments { margin-top: 24px; }
  .modal-attach-title {
    font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-faint);
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .attach-list { display: flex; flex-direction: column; gap: 10px; }

  .attach-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 4px; text-decoration: none; color: inherit;
    transition: border-color 0.15s;
  }
  .attach-item:hover { border-color: var(--accent); }

  .attach-preview {
    width: 48px; height: 48px; border-radius: 3px;
    object-fit: cover; flex-shrink: 0;
    border: 1px solid var(--rule);
  }
  .attach-icon {
    width: 48px; height: 48px; border-radius: 3px; flex-shrink: 0;
    background: var(--card-bg); border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    color: var(--ink-muted);
  }
  .attach-info { flex: 1; min-width: 0; }
  .attach-name {
    font-size: 13px; font-weight: 400; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .attach-size { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
  .attach-dl {
    font-size: 11px; color: var(--ink-faint); padding: 4px 8px;
    border: 1px solid var(--rule); border-radius: 2px;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .attach-item:hover .attach-dl { color: var(--accent); border-color: var(--accent); }

  /* Image lightbox inside modal */
  .image-full {
    max-width: 100%; border-radius: 4px;
    margin-top: 24px; border: 1px solid var(--rule);
    display: block;
  }

  /* ── Animations ── */
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp  { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Tag search ── */
  .tag-search-wrap {
    position: relative; margin-bottom: 16px;
  }

  .tag-search-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px;
    background: var(--card-bg); border: 1.5px solid var(--rule);
    border-radius: 6px; cursor: text;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .tag-search-bar.open {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(46,122,181,0.07);
    border-radius: 6px 6px 0 0;
  }

  .tag-search-icon { font-size: 14px; color: var(--ink-faint); flex-shrink: 0; }

  .tag-search-chips { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; align-items: center; }

  .tag-search-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; padding: 2px 8px; border-radius: 20px;
    background: var(--accent); color: #fff; border: none;
    font-family: inherit; font-weight: 400;
  }
  .tag-chip-x {
    cursor: pointer; opacity: 0.75; border: none; background: none;
    color: #fff; font-size: 13px; line-height: 1; padding: 0;
    transition: opacity 0.15s;
  }
  .tag-chip-x:hover { opacity: 1; }

  .tag-search-input {
    border: none; outline: none; font-family: inherit; font-size: 13px;
    font-weight: 300; color: var(--ink); background: transparent;
    min-width: 120px; flex: 1;
  }
  .tag-search-input::placeholder { color: var(--ink-faint); }

  .tag-search-clear {
    font-size: 12px; color: var(--ink-faint); background: none; border: none;
    cursor: pointer; padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
    transition: color 0.15s; display: none;
  }
  .tag-search-clear.show { display: block; }
  .tag-search-clear:hover { color: var(--accent); }

  /* Dropdown */
  .tag-dropdown {
    display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: var(--card-bg); border: 1.5px solid var(--accent);
    border-top: none; border-radius: 0 0 6px 6px;
    box-shadow: 0 8px 24px rgba(21,32,51,0.1);
    overflow: hidden;
  }
  .tag-dropdown.open { display: block; animation: fadeUp 0.15s ease; }

  .tag-dropdown-section {
    padding: 10px 14px 6px;
    font-size: 10px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-faint);
    border-bottom: 1px solid var(--rule);
  }
  .tag-dropdown-section:not(:first-child) { border-top: 1px solid var(--rule); }

  .tag-dropdown-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 14px 12px;
  }

  .tag-suggestion {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 3px 10px; border-radius: 20px; cursor: pointer;
    background: rgba(46,122,181,0.07); border: 1px solid rgba(46,122,181,0.2);
    color: var(--accent); transition: all 0.15s; font-family: inherit;
  }
  .tag-suggestion:hover { background: rgba(46,122,181,0.15); border-color: var(--accent); }
  .tag-suggestion.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tag-suggestion-count {
    font-size: 10px; opacity: 0.65;
  }

  .tag-dropdown-empty {
    padding: 14px; font-size: 13px; color: var(--ink-faint);
    font-weight: 300; text-align: center;
  }

  .tag-search-hint {
    font-size: 11px; color: var(--ink-faint); padding: 8px 14px;
    border-top: 1px solid var(--rule); font-weight: 300;
  }

  @media (max-width: 600px) {
    .nav { padding: 0 16px; }
    .nav-user { display: none; }
    .page { padding: 32px 16px 60px; }
    .modal-header, .modal-body { padding-left: 20px; padding-right: 20px; }
    .page-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  }

  .char-lan {
    font-style: normal;
    color: #6ab4e8;
    text-shadow: 0 0 12px rgba(74,143,196,0.7), 0 0 24px rgba(74,143,196,0.3);
  }
</style>
</head>
<body>
<div class="masthead"></div>

<!-- Nav -->
<nav class="nav">
  <a href="/cover" class="nav-logo">风<em class="char-lan">蓝</em>轻音部</a>
  <div class="nav-links">
    <a href="/forum.html" class="nav-link active">广 场</a>
    <a href="/post.html" class="nav-link" id="nav-post-link">投 稿</a>
  </div>
  <div class="nav-right" id="nav-right">
    <!-- filled by JS -->
  </div>
</nav>

<!-- Page -->
<div class="page">
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-eyebrow">Community · Forum</div>
      <div class="page-title">所有<em>投稿</em></div>
    </div>
    <div class="post-count" id="post-count"></div>
  </div>

<div class="page-body">
<div class="page-main">

  <!-- Sort bar -->
  <div class="sort-bar">
    <div class="sort-tabs" id="sort-tabs">
      <button class="sort-tab active" data-sort="latest"   onclick="setSort('latest',this)">
        <span class="sort-icon">🕐</span> 最新
      </button>
      <button class="sort-tab" data-sort="views"    onclick="setSort('views',this)">
        <span class="sort-icon">👁</span> 最多浏览
      </button>
      <button class="sort-tab" data-sort="likes"    onclick="setSort('likes',this)">
        <span class="sort-icon">♥</span> 最多点赞
      </button>
      <button class="sort-tab" data-sort="comments" onclick="setSort('comments',this)">
        <span class="sort-icon">💬</span> 最多评论
      </button>
    </div>
    <div class="sort-info" id="sort-info"></div>
  </div>

  <!-- Tag search -->
  <div class="tag-search-wrap" id="tag-search-wrap">
    <div class="tag-search-bar" id="tag-search-bar" onclick="focusTagSearch()">
      <span class="tag-search-icon">🏷</span>
      <div class="tag-search-chips" id="tag-search-chips">
        <input class="tag-search-input" id="tag-search-input"
               placeholder="按标签筛选…" autocomplete="off">
      </div>
      <button class="tag-search-clear" id="tag-search-clear" onclick="clearAllTagFilters(event)">✕ 清除</button>
    </div>
    <div class="tag-dropdown" id="tag-dropdown">
      <div class="tag-dropdown-section">热门标签</div>
      <div class="tag-dropdown-list" id="hot-tag-list">加载中…</div>
      <div id="search-tag-section" style="display:none">

<script>
// ── Tag filter state (multi-select set) ─────────────────────
let activeTagFilters = new Set();
let allPostsCache    = [];   // cache for hot tag computation

// -- Compute hot tags from cached posts (top 10 by count) ---
function computeHotTags(posts) {
  const count = {};
  posts.forEach(p => {
    if (!p.tags) return;
    p.tags.split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
      count[t] = (count[t] || 0) + 1;
    });
  });
  return Object.entries(count)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);
}

function renderHotTags() {
  const el = document.getElementById('hot-tag-list');
  if (!el) return;
  const hot = computeHotTags(allPostsCache);
  if (!hot.length) { el.innerHTML = '<span style="font-size:12px;color:var(--ink-faint);font-weight:300">暂无标签数据</span>'; return; }
  el.innerHTML = hot.map(([tag, n]) => {
    const col  = tagColor(tag);
    const isOn = activeTagFilters.has(tag);
    const bg   = isOn ? col.text : col.bg;
    const txt  = isOn ? '#fff'   : col.text;
    const bdr  = isOn ? col.text : col.border;
    return `<button style="background:${bg};border:1px solid ${bdr};color:${txt};` +
      `display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;` +
      `border-radius:20px;cursor:pointer;transition:all 0.15s;font-family:inherit;` +
      `letter-spacing:0.04em;"
       onclick="toggleTagFilter('${tag.replace(/'/g,"\\'")}')">
       #${tag}<span style="font-size:10px;opacity:0.65">${n}</span>
    </button>`;
  }).join('');
}

function renderSearchTags(query) {
  const section = document.getElementById('search-tag-section');
  const list    = document.getElementById('search-tag-list');
  if (!query.trim()) { section.style.display = 'none'; return; }
  // Find matching tags from all posts
  const q = query.trim().toLowerCase();
  const count = {};
  allPostsCache.forEach(p => {
    if (!p.tags) return;
    p.tags.split(',').map(t => t.trim()).filter(Boolean)
      .filter(t => t.toLowerCase().includes(q))
      .forEach(t => { count[t] = (count[t] || 0) + 1; });
  });
  const matches = Object.entries(count).sort((a,b) => b[1]-a[1]).slice(0, 10);
  section.style.display = 'block';
  if (!matches.length) {
    // Show "add this tag as filter" option even if not in DB
    const _q = query.trim();
    const _col = tagColor(_q);
    list.innerHTML = `<button style="background:${_col.bg};border:1px solid ${_col.border};color:${_col.text};` +
      `display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;` +
      `border-radius:20px;cursor:pointer;transition:all 0.15s;font-family:inherit;letter-spacing:0.04em;"
       onclick="toggleTagFilter('${_q.replace(/'/g,"\\'")}')">
       #${_q} <span style="font-size:10px;opacity:0.5">搜索</span>
    </button>`;
  } else {
    list.innerHTML = matches.map(([tag, n]) => {
      const col  = tagColor(tag);
      const isOn = activeTagFilters.has(tag);
      const bg   = isOn ? col.text : col.bg;
      const txt  = isOn ? '#fff'   : col.text;
      const bdr  = isOn ? col.text : col.border;
      return `<button style="background:${bg};border:1px solid ${bdr};color:${txt};` +
        `display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;` +
        `border-radius:20px;cursor:pointer;transition:all 0.15s;font-family:inherit;` +
        `letter-spacing:0.04em;"
         onclick="toggleTagFilter('${tag.replace(/'/g,"\\'")}')">
         #${tag}<span style="font-size:10px;opacity:0.65">${n}</span>
      </button>`;
    }).join('');
  }
}

function renderSearchChips() {
  const chips = document.getElementById('tag-search-chips');
  const input = document.getElementById('tag-search-input');
  chips.querySelectorAll('.tag-search-chip').forEach(el => el.remove());
  activeTagFilters.forEach(tag => {
    const chip = document.createElement('div');
    chip.className = 'tag-search-chip';
    chip.innerHTML = `#${tag}<button class="tag-chip-x" onclick="toggleTagFilter('${tag.replace(/'/g,"\\'")}')">×</button>`;
    chips.insertBefore(chip, input);
  });
  const clearBtn = document.getElementById('tag-search-clear');
  if (clearBtn) clearBtn.classList.toggle('show', activeTagFilters.size > 0);
}

function toggleTagFilter(tag) {
  if (activeTagFilters.has(tag)) activeTagFilters.delete(tag);
  else activeTagFilters.add(tag);
  renderSearchChips();
  renderHotTags();
  renderSearchTags(document.getElementById('tag-search-input')?.value || '');
  loadPosts();
}

function clearAllTagFilters(e) {
  if (e) e.stopPropagation();
  activeTagFilters.clear();
  renderSearchChips();
  renderHotTags();
  closeTagDropdown();
  loadPosts();
}

function focusTagSearch() {
  document.getElementById('tag-search-input').focus();
  openTagDropdown();
}

function openTagDropdown() {
  document.getElementById('tag-search-bar').classList.add('open');
  document.getElementById('tag-dropdown').classList.add('open');
}

function closeTagDropdown() {
  document.getElementById('tag-search-bar').classList.remove('open');
  document.getElementById('tag-dropdown').classList.remove('open');
  document.getElementById('search-tag-section').style.display = 'none';
  document.getElementById('tag-search-input').value = '';
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('tag-search-wrap')?.contains(e.target)) {
    closeTagDropdown();
  }
});

// Tag search input events
window.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('tag-search-input');
  if (!input) return;

  input.addEventListener('focus', () => openTagDropdown());
  input.addEventListener('input', () => renderSearchTags(input.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = input.value.trim();
      if (val) { toggleTagFilter(val); input.value = ''; renderSearchTags(''); }
    } else if (e.key === 'Escape') {
      closeTagDropdown();
    } else if (e.key === 'Backspace' && !input.value && activeTagFilters.size) {
      const last = [...activeTagFilters].pop();
      toggleTagFilter(last);
    }
  });

  // Handle ?tag= URL param on load
  const urlTag = new URLSearchParams(location.search).get('tag');
  if (urlTag) { activeTagFilters.add(urlTag); renderSearchChips(); }
});

// Legacy compat for article.html tag links (single tag)
function setTagFilter(tag) { toggleTagFilter(tag); }
function clearTagFilter()  { clearAllTagFilters(); }

// ── Sort state ──────────────────────────────────────────────
let currentSort = 'latest';

function setSort(sort, el) {
  if (sort === currentSort) return;
  currentSort = sort;
  document.querySelectorAll('.sort-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadPosts();
}

// ── Auth state ──────────────────────────────────────────────
const token    = localStorage.getItem('token');
const username = localStorage.getItem('username');

// Render nav right side
const navRight = document.getElementById('nav-right');
if (token && username) {
  navRight.innerHTML = `
    <div class="nav-user">你好，<span>${username}</span></div>
    <a href="/profile.html" class="nav-btn">我的主页</a>
    <a href="/post.html" class="nav-btn nav-btn-primary">写投稿</a>
    <button class="nav-btn nav-btn-outline" onclick="logout()">退出</button>
  `;
} else {
  navRight.innerHTML = `
    <a href="/login" class="nav-btn nav-btn-outline">登录</a>
    <a href="/login" class="nav-btn nav-btn-primary">注册</a>
  `;
  // Hide post link for guests (optional — they'll be redirected anyway)
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  window.location.href = '/';
}

// ── Helpers ─────────────────────────────────────────────────

// Build avatar HTML — shows photo if available, else initial letter
function avatarHtml(username, avatarUrl, size = 36) {
  const letter = (username || '?')[0].toUpperCase();
  const style  = `width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--ink);color:#f5f2ec;font-family:'DM Serif Display',serif;font-size:${Math.round(size*0.42)}px;font-weight:500;`;
  const url = (avatarUrl && avatarUrl !== '0' && avatarUrl !== 0 && String(avatarUrl).startsWith('/')) ? avatarUrl : null;
  if (url) {
    return `<div style="${style}padding:0"><img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='${letter}';this.parentElement.style.padding=''" alt="${letter}"></div>`;
  }
  return `<div style="${style}">${letter}</div>`;
}


// ── Tag color system ─────────────────────────────────────────
// Hash tag string to a stable index, pick from a curated palette
const TAG_PALETTE = [
  { bg: 'rgba(46,122,181,0.08)',  border: 'rgba(46,122,181,0.28)',  text: '#2563a8' },  // blue
  { bg: 'rgba(26,168,180,0.08)',  border: 'rgba(26,168,180,0.28)',  text: '#0e8a96' },  // cyan
  { bg: 'rgba(39,174,96,0.08)',   border: 'rgba(39,174,96,0.28)',   text: '#1e8449' },  // green
  { bg: 'rgba(142,68,173,0.08)',  border: 'rgba(142,68,173,0.28)',  text: '#7d3c98' },  // purple
  { bg: 'rgba(74,159,212,0.08)',  border: 'rgba(74,159,212,0.28)',  text: '#1a7ab5' },  // sky
  { bg: 'rgba(22,160,133,0.08)',  border: 'rgba(22,160,133,0.28)',  text: '#148a72' },  // teal
  { bg: 'rgba(52,100,200,0.08)',  border: 'rgba(52,100,200,0.28)',  text: '#2d5bb5' },  // indigo
  { bg: 'rgba(100,180,230,0.08)', border: 'rgba(100,180,230,0.28)', text: '#1e6fa0' },  // steel
  { bg: 'rgba(130,90,200,0.08)',  border: 'rgba(130,90,200,0.28)',  text: '#6040b0' },  // violet
  { bg: 'rgba(26,188,156,0.08)',  border: 'rgba(26,188,156,0.28)',  text: '#17a589' },  // mint
  { bg: 'rgba(70,130,180,0.08)',  border: 'rgba(70,130,180,0.28)',  text: '#2e6b9e' },  // steel-blue
  { bg: 'rgba(155,89,182,0.08)',  border: 'rgba(155,89,182,0.28)',  text: '#8e44ad' },  // lavender
];

function tagHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h) % TAG_PALETTE.length;
}

function tagColor(tag) {
  return TAG_PALETTE[tagHash(tag)];
}

function tagPillHtml(tag, opts = {}) {
  const col      = tagColor(tag);
  const active   = opts.active   || false;
  const onclick  = opts.onclick  ? `onclick="${opts.onclick}"` : '';
  const href     = opts.href     ? `href="${opts.href}"` : '';
  const tagName  = opts.tagName  || 'span';
  const extraCls = opts.extraCls || '';

  const activeBg   = col.text;
  const activeText = '#fff';
  const bg         = active ? activeBg  : col.bg;
  const text       = active ? activeText : col.text;
  const border     = active ? activeBg  : col.border;

  const style = `background:${bg};border:1px solid ${border};color:${text};` +
    `display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:400;` +
    `letter-spacing:0.04em;padding:2px 9px;border-radius:20px;cursor:pointer;transition:all 0.15s;`;

  return `<${tagName} style="${style}" ${href} ${onclick} class="${extraCls}">#${tag}</${tagName}>`;
}

function formatDate(str) {
  const d = new Date(str.replace(' ', 'T') + 'Z');
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function isImage(mime) { return mime && mime.startsWith('image/'); }

// ── Sidebar ──────────────────────────────────────────────────
function renderSidebarPosts(elId, posts, statKey, statIcon) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!posts.length) {
    el.innerHTML = '<div style="padding:12px 16px;font-size:12px;color:var(--ink-faint);font-weight:300">暂无数据</div>';
    return;
  }
  el.innerHTML = posts.map((p, i) => `
    <div class="sidebar-post-item" onclick="window.location.href='/article.html?id=${p.id}'"
         style="animation-delay:${0.05 + i * 0.04}s">
      <div class="sidebar-post-title">${p.title}</div>
      <div class="sidebar-post-meta">
        <span>${p.nickname || p.username}</span>
        <span>·</span>
        <span class="sidebar-post-stat">${statIcon} ${p[statKey] || 0}</span>
      </div>
    </div>`).join('');
}

function renderSidebarTags(posts) {
  const el = document.getElementById('sidebar-tags');
  if (!el) return;
  const hot = computeHotTags(posts).slice(0, 10);
  if (!hot.length) { el.innerHTML = '<span style="font-size:12px;color:var(--ink-faint);font-weight:300">暂无标签</span>'; return; }
  el.innerHTML = hot.map(([tag]) =>
    tagPillHtml(tag, {
      onclick: "toggleTagFilter('" + tag.replace(/'/g, "\'") + "')",
      extraCls: 'post-tag-pill'
    })
  ).join('');
}

function renderSidebar(posts) {
  // Hot: top 5 by views
  const hot    = [...posts].sort((a,b) => (b.view_count||0) - (a.view_count||0)).slice(0, 5);
  // Latest: top 5 by date
  const latest = [...posts].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);

  renderSidebarPosts('sidebar-hot',    hot,    'view_count', '👁');
  renderSidebarPosts('sidebar-latest', latest, 'comment_count', '💬');
  renderSidebarTags(posts);
}

// ── Load posts ───────────────────────────────────────────────
async function loadPosts() {
  const area = document.getElementById('list-area');
  area.innerHTML = '<div class="state-msg"><div class="icon" style="opacity:0.3">◌</div><p>加载中…</p></div>';
  try {
    const res = await fetch('/api/posts?sort=' + currentSort);
    const posts = await res.json();

    if (!posts.length && !activeTagFilters.size) {
      area.innerHTML = `
        <div class="state-msg">
          <div class="icon">✦</div>
          <p>还没有任何投稿，成为第一位作者吧</p>
          <a href="/post.html">立即投稿 →</a>
        </div>`;
      return;
    }

    // Cache posts for hot tag computation
    allPostsCache = posts;
    renderHotTags();
    renderSidebar(posts);

    // Filter by active tags (AND logic: post must have ALL selected tags)
    const filtered = activeTagFilters.size
      ? posts.filter(p => {
          if (!p.tags) return false;
          const postTags = p.tags.split(',').map(t => t.trim());
          return [...activeTagFilters].every(ft => postTags.includes(ft));
        })
      : posts;

    const sortLabel = { latest:'最新', views:'最多浏览', likes:'最多点赞', comments:'最多评论' };
    document.getElementById('post-count').textContent = `共 ${filtered.length} 篇`;
    document.getElementById('sort-info').textContent  = filtered.length ? `按${sortLabel[currentSort]}排列` : '';

    if (!filtered.length) {
      const tagList = [...activeTagFilters].map(t=>`#${t}`).join(' + ');
      area.innerHTML = `<div class="state-msg"><div class="icon">✦</div><p>没有找到标签为 ${tagList} 的投稿</p></div>`;
      return;
    }

    const list = document.createElement('div');
    list.className = 'post-list';

    filtered.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = 'post-item';
      item.style.animationDelay = (i * 0.04) + 's';
      item.onclick = () => window.location.href = `/article.html?id=${p.id}`;

      const hasFiles = p.attachment_count > 0;
      const excerpt  = p.content ? p.content.slice(0, 120) + (p.content.length > 120 ? '…' : '') : '';

      item.innerHTML = `
        <div class="post-main">
          <div class="post-meta" style="display:flex;align-items:center;gap:8px">
            <a href="/profile.html?user=${encodeURIComponent(p.username)}"
               onclick="event.stopPropagation()"
               style="display:flex;align-items:center;gap:7px;text-decoration:none"
               title="查看主页">
              ${avatarHtml(p.nickname || p.username, p.avatar, 24)}
              <span class="post-author">${p.nickname || p.username}</span>
            </a>
            <span class="post-dot"></span>
            <span class="post-date">${formatDate(p.created_at)}</span>
          </div>
          <div class="post-title">${p.title}</div>
          ${excerpt ? `<div class="post-excerpt">${excerpt}</div>` : ''}
          ${p.tags ? `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
            ${p.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t =>
              tagPillHtml(t, { active: activeTagFilters.has(t), onclick: "event.stopPropagation();toggleTagFilter('" + t.replace(/'/g,"\'") + "')", extraCls: 'post-tag-pill' })
            ).join('')}
          </div>` : ''}
          <div class="post-footer">
            ${hasFiles ? `<span class="post-tag has-files">📎 ${p.attachment_count} 个附件</span>` : ''}
            <span class="post-stat ${currentSort==='views'    ? 'highlight' : ''}"><span class="post-stat-icon">👁</span>${p.view_count    || 0}</span>
            <span class="post-stat ${currentSort==='comments' ? 'highlight' : ''}"><span class="post-stat-icon">💬</span>${p.comment_count || 0}</span>
            <span class="post-stat ${currentSort==='likes'    ? 'highlight' : ''}"><span class="post-stat-icon">♥</span>${p.like_count    || 0}</span>
          </div>
        </div>
        <div class="post-arrow">›</div>
      `;
      list.appendChild(item);
    });

    area.innerHTML = '';
    area.appendChild(list);

  } catch (e) {
    document.getElementById('list-area').innerHTML = `
      <div class="state-msg">
        <div class="icon">!</div>
        <p>加载失败，请确认服务器正在运行</p>
      </div>`;
  }
}

// ── Modal ────────────────────────────────────────────────────
async function openModal(id) {
  try {
    const res  = await fetch(`/api/posts/${id}`);
    const post = await res.json();

    document.getElementById('modal-author').textContent  = post.username;
    document.getElementById('modal-date').textContent    = formatDate(post.created_at);
    document.getElementById('modal-title').textContent   = post.title;
    document.getElementById('modal-content').textContent = post.content || '';

    const attachArea = document.getElementById('modal-attachments');
    const attachList = document.getElementById('attach-list');
    attachList.innerHTML = '';

    if (post.attachments && post.attachments.length > 0) {
      attachArea.style.display = 'block';
      post.attachments.forEach(a => {
        const url  = `/uploads/${a.filename}`;
        const item = document.createElement('a');
        item.className = 'attach-item';
        item.href   = url;
        item.target = '_blank';

        if (isImage(a.mimetype)) {
          item.innerHTML = `
            <img class="attach-preview" src="${url}" alt="${a.originalname}">
            <div class="attach-info">
              <div class="attach-name">${a.originalname}</div>
              <div class="attach-size">${formatSize(a.size)}</div>
            </div>
            <span class="attach-dl">查看</span>
          `;
        } else {
          item.innerHTML = `
            <div class="attach-icon">TXT</div>
            <div class="attach-info">
              <div class="attach-name">${a.originalname}</div>
              <div class="attach-size">${formatSize(a.size)}</div>
            </div>
            <span class="attach-dl">下载</span>
          `;
        }
        attachList.appendChild(item);
      });
    } else {
      attachArea.style.display = 'none';
    }

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  } catch (e) {
    console.error(e);
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});
