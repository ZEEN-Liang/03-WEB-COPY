<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广场 · 论坛广场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/forum.css">
<link rel="stylesheet" href="css/nav-notify.css">
</head>
<body>
<div class="masthead"></div>

<!-- Nav -->
<nav class="nav">
  <a href="/index.html" class="nav-logo">风<em class="char-lan">蓝</em>轻音部</a>
  <div class="nav-links">
    <a href="/forum.html" class="nav-link active">广 场</a>
    <a href="/qa.html" class="nav-link">问 答</a>
    <a href="/post.html" class="nav-link" id="nav-post-link">投 稿</a>
  </div>
  <!-- Search -->
  <div class="nav-search" id="nav-search">
    <div class="nav-search-box">
      <span class="nav-search-icon">⌕</span>
      <input class="nav-search-input" id="nav-search-input"
             type="text" placeholder="搜索文章、用户…" autocomplete="off">
      <button class="nav-search-clear" id="nav-search-clear" style="display:none">✕</button>
    </div>
    <div class="nav-search-dropdown" id="nav-search-dropdown" style="display:none"></div>
  </div>

  <div id="nav-notify"></div>
  <div class="nav-right" id="nav-right">
    <!-- filled by JS -->
  </div>
</nav>

<!-- Page -->
<div class="page">
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-eyebrow">Community · Forum</div>
      <div class="page-title">所有<em>投稿</em></div>
    </div>
    <div class="post-count" id="post-count"></div>
  </div>

<div class="page-body">
<div class="page-main">

  <!-- Sort bar -->
  <div class="sort-bar">
    <div class="sort-tabs" id="sort-tabs">
      <button class="sort-tab active" data-sort="latest"   onclick="setSort('latest',this)">
        <span class="sort-icon">🕐</span> 最新
      </button>
      <button class="sort-tab" data-sort="views"    onclick="setSort('views',this)">
        <span class="sort-icon">👁</span> 最多浏览
      </button>
      <button class="sort-tab" data-sort="likes"    onclick="setSort('likes',this)">
        <span class="sort-icon">♥</span> 最多点赞
      </button>
      <button class="sort-tab" data-sort="comments" onclick="setSort('comments',this)">
        <span class="sort-icon">💬</span> 最多评论
      </button>
    </div>
    <div class="sort-info" id="sort-info"></div>
  </div>

  <!-- Tag search -->
  <div class="tag-search-wrap" id="tag-search-wrap">
    <div class="tag-search-bar" id="tag-search-bar" onclick="focusTagSearch()">
      <span class="tag-search-icon">🏷</span>
      <div class="tag-search-chips" id="tag-search-chips">
        <input class="tag-search-input" id="tag-search-input"
               placeholder="按标签筛选…" autocomplete="off">
      </div>
      <button class="tag-search-clear" id="tag-search-clear" onclick="clearAllTagFilters(event)">✕ 清除</button>
    </div>
    <div class="tag-dropdown" id="tag-dropdown">
      <div class="tag-dropdown-section">热门标签</div>
      <div class="tag-dropdown-list" id="hot-tag-list">加载中…</div>
      <div id="search-tag-section" style="display:none">
        <div class="tag-dropdown-section">搜索结果</div>
        <div class="tag-dropdown-list" id="search-tag-list"></div>
      </div>
      <div class="tag-search-hint">输入标签名后按 Enter 添加筛选 · 搜索仅用于筛选，不写入数据库</div>
    </div>
  </div>

  <div id="list-area">
    <div class="state-msg" id="loading-msg">
      <div class="icon">◌</div>
      <p>正在加载...</p>
    </div>
  </div>

</div><!-- /page-main -->

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">

  <!-- 公告 -->
  <div class="sidebar-card" style="animation-delay:0.05s">
    <div class="sidebar-head"><span class="sidebar-head-icon">📢</span>公告</div>
    <div class="sidebar-announce" id="sidebar-announce">欢迎来到论坛广场！在这里分享你的音乐、文章与创作，与社区共鸣。</div>
  </div>

  <!-- 热门文章 -->
  <div class="sidebar-card" style="animation-delay:0.1s">
    <div class="sidebar-head"><span class="sidebar-head-icon">🔥</span>热门文章</div>
    <div class="sidebar-post-list" id="sidebar-hot"></div>
  </div>

  <!-- 最新发布 -->
  <div class="sidebar-card" style="animation-delay:0.15s">
    <div class="sidebar-head"><span class="sidebar-head-icon">🕐</span>最新发布</div>
    <div class="sidebar-post-list" id="sidebar-latest"></div>
  </div>

  <!-- Tag 推荐 -->
  <div class="sidebar-card" style="animation-delay:0.2s">
    <div class="sidebar-head"><span class="sidebar-head-icon">🏷</span>标签推荐</div>
    <div class="sidebar-tags" id="sidebar-tags"><span style="font-size:12px;color:var(--ink-faint);font-weight:300">加载中…</span></div>
  </div>

</aside>
</div><!-- /page-body -->
</div><!-- /page -->

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-eyebrow">
        <span id="modal-author" class="modal-author-name"></span>
        <span>·</span>
        <span id="modal-date"></span>
      </div>
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-content" id="modal-content"></div>
      <div class="modal-attachments" id="modal-attachments" style="display:none">
        <div class="modal-attach-title">附件</div>
        <div class="attach-list" id="attach-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="script/forum.posts.js"></script>
<script src="script/forum.search.js"></script>
<script src="script/nav-notify.js"></script>
<script src="script/nav-intercept.js"></script>

</body>
</html>
