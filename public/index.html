<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风蓝轻音部</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+SC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --wind: #c8dff7;      /* 风 — 淡蓝 */
    --blue: #4a8fc4;      /* 蓝 — 主色 */
    --blue-deep: #1e4d7a; /* 深蓝 */
    --blue-glow: rgba(74,143,196,0.35);
    --ink: #f0f4f8;
    --ink-muted: rgba(220,232,244,0.72);
    --ink-faint: rgba(200,223,247,0.45);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #0d1520;
    color: var(--ink);
  }

  /* ── Background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
  }

  .bg-img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center 30%;
    filter: brightness(0.42) saturate(0.7);
    transform: scale(1.04);
    animation: subtle-drift 20s ease-in-out infinite alternate;
  }

  @keyframes subtle-drift {
    from { transform: scale(1.04) translateY(0); }
    to   { transform: scale(1.07) translateY(-8px); }
  }

  /* Dark gradient overlays */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(13,21,32,0.3) 0%,
        rgba(13,21,32,0.1) 30%,
        rgba(13,21,32,0.2) 60%,
        rgba(13,21,32,0.75) 100%
      ),
      linear-gradient(to right,
        rgba(13,21,32,0.45) 0%,
        transparent 40%,
        transparent 60%,
        rgba(13,21,32,0.35) 100%
      );
  }

  /* Rain canvas */
  #rain-canvas {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    width: 100%; height: 100%;
  }

  /* ── Content ── */
  .stage {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    padding: 0 24px;
  }

  /* Top rule line */
  .top-rule {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right,
      transparent 0%,
      var(--blue) 30%,
      var(--wind) 50%,
      var(--blue) 70%,
      transparent 100%
    );
    animation: rule-glow 3s ease-in-out infinite alternate;
  }
  @keyframes rule-glow {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  /* Logo mark */
  .logo-mark {
    margin-bottom: 28px;
    opacity: 0;
    animation: fade-up 1s ease 0.3s both;
  }

  .music-icon {
    width: 52px; height: 52px;
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  .music-icon svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 12px var(--blue-glow));
  }

  /* Main title */
  .main-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(42px, 7vw, 76px);
    font-weight: 600;
    letter-spacing: 0.18em;
    line-height: 1;
    text-align: center;
    color: #fff;
    text-shadow: 0 2px 40px rgba(74,143,196,0.4);
    opacity: 0;
    animation: fade-up 1s ease 0.5s both;
    position: relative;
  }

  /* 蓝 character special treatment */
  .char-lan {
    position: relative;
    display: inline-block;
    color: var(--wind);
    text-shadow:
      0 0 20px rgba(74,143,196,0.9),
      0 0 40px rgba(74,143,196,0.5),
      0 2px 40px rgba(74,143,196,0.4);
  }

  /* Animated underline for 蓝 */
  .char-lan::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--blue), var(--wind), var(--blue));
    border-radius: 1px;
    animation: lan-underline 2.5s ease-in-out infinite;
  }

  @keyframes lan-underline {
    0%, 100% { transform: scaleX(0.6); opacity: 0.5; }
    50%       { transform: scaleX(1);   opacity: 1; }
  }

  /* Title divider */
  .title-divider {
    display: flex; align-items: center; gap: 14px;
    margin: 28px 0 24px;
    opacity: 0;
    animation: fade-up 1s ease 0.75s both;
    width: min(340px, 70vw);
  }

  .title-divider-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--blue-glow), transparent);
  }

  .title-divider-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 8px var(--blue);
    animation: dot-pulse 2s ease-in-out infinite;
  }

  @keyframes dot-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%       { transform: scale(1.5); opacity: 1; }
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(13px, 2vw, 17px);
    font-weight: 300;
    letter-spacing: 0.28em;
    color: var(--ink-muted);
    text-align: center;
    line-height: 1.9;
    opacity: 0;
    animation: fade-up 1s ease 0.95s both;
  }

  /* CTA button */
  .enter-btn {
    margin-top: 52px;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 36px;
    border: 1px solid rgba(74,143,196,0.4);
    border-radius: 2px;
    background: rgba(74,143,196,0.08);
    color: var(--wind);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; font-weight: 300;
    letter-spacing: 0.2em;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.35s ease;
    backdrop-filter: blur(4px);
    opacity: 0;
    animation: fade-up 1s ease 1.2s both;
    position: relative; overflow: hidden;
  }

  .enter-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(74,143,196,0.12), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }
  .enter-btn:hover::before { transform: translateX(0); }
  .enter-btn:hover {
    border-color: var(--blue);
    color: #fff;
    box-shadow: 0 0 24px rgba(74,143,196,0.3), inset 0 0 24px rgba(74,143,196,0.1);
    transform: translateY(-2px);
  }

  .enter-arrow {
    font-size: 16px;
    transition: transform 0.3s ease;
  }
  .enter-btn:hover .enter-arrow { transform: translateX(5px); }

  /* Bottom info */
  .bottom-bar {
    position: absolute; bottom: 28px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 32px;
    opacity: 0;
    animation: fade-in 1.2s ease 1.6s both;
  }

  .bottom-link {
    font-size: 11px; font-weight: 200; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-faint);
    text-decoration: none; transition: color 0.2s;
  }
  .bottom-link:hover { color: var(--wind); }
  .bottom-sep { color: var(--ink-faint); font-size: 10px; opacity: 0.5; }

  /* ── Danmaku input ── */
  .danmaku-wrap {
    margin-top: 20px;
    display: flex; align-items: center; gap: 0;
    width: min(420px, 88vw);
    opacity: 0;
    animation: fade-up 1s ease 1.4s both;
  }

  .danmaku-input {
    flex: 1; height: 40px; padding: 0 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(74,143,196,0.3);
    border-right: none;
    border-radius: 20px 0 0 20px;
    color: var(--ink); font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; font-weight: 300; outline: none;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(6px);
  }
  .danmaku-input::placeholder { color: rgba(200,223,247,0.35); }
  .danmaku-input:focus {
    background: rgba(255,255,255,0.1);
    border-color: rgba(74,143,196,0.65);
  }

  .danmaku-send {
    height: 40px; padding: 0 18px;
    background: rgba(74,143,196,0.25);
    border: 1px solid rgba(74,143,196,0.4);
    border-radius: 0 20px 20px 0;
    color: var(--wind); font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px; font-weight: 400; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .danmaku-send:hover {
    background: rgba(74,143,196,0.45);
    border-color: var(--blue); color: #fff;
  }
  .danmaku-send:active { transform: scale(0.97); }
  .danmaku-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Danmaku floating layer ── */
  #danmaku-layer {
    position: fixed; inset: 0; z-index: 8;
    pointer-events: none; overflow: hidden;
  }

  .danmaku-item {
    position: absolute;
    white-space: nowrap;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px; font-weight: 300;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    animation: danmaku-fly linear forwards;
    opacity: 0.88;
  }
  @keyframes danmaku-fly {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(-100vw - 100%)); }
  }

  /* ── Login hint (shown when not logged in) ── */
  .danmaku-hint {
    margin-top: 20px;
    font-size: 12px; font-weight: 300; letter-spacing: 0.1em;
    color: rgba(200,223,247,0.35);
    opacity: 0;
    animation: fade-up 1s ease 1.4s both;
  }
  .danmaku-hint a { color: rgba(100,180,232,0.6); text-decoration: none; }
  .danmaku-hint a:hover { color: var(--wind); }

  /* ── Login status shown (bottom bar tweak) ── */
  .bottom-user {
    font-size: 11px; font-weight: 200; letter-spacing: 0.1em;
    color: rgba(200,223,247,0.45);
  }

  /* Ambient glow orbs */
  .orb {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 2;
    filter: blur(60px); opacity: 0.12;
    animation: orb-float 8s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #4a8fc4, transparent);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #c8dff7, transparent);
    bottom: -80px; right: -80px;
    opacity: 0.08;
    animation-delay: -3s;
  }
  @keyframes orb-float {
    from { transform: translate(0,0); }
    to   { transform: translate(20px, 20px); }
  }

  /* Scroll hint */
  .scroll-hint {
    position: absolute; bottom: 68px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    opacity: 0;
    animation: fade-in 1s ease 2s both;
  }

  .scroll-mouse {
    width: 20px; height: 32px; border: 1.5px solid rgba(74,143,196,0.4);
    border-radius: 10px; display: flex; justify-content: center;
    padding-top: 5px;
  }
  .scroll-wheel {
    width: 3px; height: 6px; background: var(--blue);
    border-radius: 2px;
    animation: scroll-wheel 1.8s ease-in-out infinite;
  }
  @keyframes scroll-wheel {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(10px); opacity: 0; }
  }

  /* Typewriter cursor */
  #subtitle {
    min-height: 3em;
    white-space: pre;
    text-align: center;
  }
  /* "回车清除" flash */
  @keyframes clear-flash {
    0%   { opacity: 1; }
    20%  { opacity: 0; }
    40%  { opacity: 1; }
    60%  { opacity: 0; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }
  .tw-clearing {
    animation: clear-flash 0.45s ease forwards;
  }

  /* Typewriter cursor */
  .tw-cursor {
    display: inline-block;
    width: 1.5px; height: 1.1em;
    background: var(--wind);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
    box-shadow: 0 0 6px var(--blue);
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Animations */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 480px) {
    .main-title { letter-spacing: 0.1em; }
    .subtitle { letter-spacing: 0.16em; }
    .bottom-bar { gap: 16px; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <img class="bg-img" src="/images/cover-bg.png" alt="" draggable="false">
</div>

<!-- Danmaku layer -->
<div id="danmaku-layer"></div>

<!-- Rain canvas -->
<canvas id="rain-canvas"></canvas>

<!-- Ambient orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Top rule -->
<div class="top-rule"></div>

<!-- Main stage -->
<div class="stage">

  <!-- Music note logo -->
  <div class="logo-mark">
    <div class="music-icon">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Staff lines -->
        <line x1="6" y1="20" x2="46" y2="20" stroke="rgba(200,223,247,0.3)" stroke-width="0.8"/>
        <line x1="6" y1="25" x2="46" y2="25" stroke="rgba(200,223,247,0.3)" stroke-width="0.8"/>
        <line x1="6" y1="30" x2="46" y2="30" stroke="rgba(200,223,247,0.3)" stroke-width="0.8"/>
        <line x1="6" y1="35" x2="46" y2="35" stroke="rgba(200,223,247,0.3)" stroke-width="0.8"/>
        <line x1="6" y1="40" x2="46" y2="40" stroke="rgba(200,223,247,0.3)" stroke-width="0.8"/>
        <!-- Eighth note 1 -->
        <ellipse cx="16" cy="41" rx="4" ry="2.8" transform="rotate(-15 16 41)"
          fill="#4a8fc4" opacity="0.9"/>
        <line x1="19.8" y1="39.5" x2="19.8" y2="22" stroke="#4a8fc4" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Eighth note 2 -->
        <ellipse cx="30" cy="36" rx="4" ry="2.8" transform="rotate(-15 30 36)"
          fill="#c8dff7" opacity="0.85"/>
        <line x1="33.8" y1="34.5" x2="33.8" y2="17" stroke="#c8dff7" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Beam -->
        <path d="M19.8 22 Q26.8 18 33.8 17" stroke="#c8dff7" stroke-width="1.5"
          stroke-linecap="round" fill="none" opacity="0.7"/>
        <!-- Glow circle -->
        <circle cx="26" cy="26" r="22" stroke="rgba(74,143,196,0.2)" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <!-- Main title -->
  <h1 class="main-title">
    风<span class="char-lan">蓝</span>轻音部
  </h1>

  <!-- Divider -->
  <div class="title-divider">
    <div class="title-divider-line"></div>
    <div class="title-divider-dot"></div>

  <!-- Subtitle (typewriter) -->
  <p class="subtitle" id="subtitle" style="min-height:2.2em;white-space:pre-wrap;text-align:center"></p>

  <!-- Enter button -->

    进入广场
    <span class="enter-arrow">→</span>
  </a>

  <!-- Danmaku input (logged in) / hint (not logged in) — rendered by JS -->
  <div id="danmaku-area"></div>

  <!-- Bottom bar -->
  <div class="bottom-bar" id="bottom-bar"></div>

</div>

<script>
(function () {
  var SUBTITLES = [
    ['一个个瞬间积累起来', '就是一辈子'],
    ['组一辈子乐队！'],
    ['一身素轻纱', '草柄当头花']
  ];
  var TYPE_SPEED  = 90;
  var PAUSE_AFTER = 2200;
  var PAUSE_NEXT  = 500;

  var el = document.getElementById('subtitle');
  if (!el) return;

  var cursor = document.createElement('span');
  cursor.className = 'tw-cursor';
  el.appendChild(cursor);

  var used = [];
  var lastIdx = -1;

  function pickNext() {
    if (used.length >= SUBTITLES.length) used = [];
    var idx;
    do { idx = Math.floor(Math.random() * SUBTITLES.length); }
    while (used.indexOf(idx) !== -1 || idx === lastIdx);
    used.push(idx);
    lastIdx = idx;
    return SUBTITLES[idx];
  }

  function setText(lines, charCount) {
    while (el.firstChild && el.firstChild !== cursor) {
      el.removeChild(el.firstChild);
    }
    var total = 0;
    var done = false;
    for (var li = 0; li < lines.length && !done; li++) {
      var line = lines[li];
      if (total + line.length >= charCount) {
        var part = line.slice(0, charCount - total);
        el.insertBefore(document.createTextNode(part), cursor);
        done = true;
      } else {
        el.insertBefore(document.createTextNode(line), cursor);
        total += line.length;
        if (li < lines.length - 1 && total < charCount) {
          el.insertBefore(document.createElement('br'), cursor);
        }
      }
    }
  }

  function totalChars(lines) {
    var n = 0;
    for (var i = 0; i < lines.length; i++) n += lines[i].length;
    return n;
  }

  function typePhase(lines) {
    var max = totalChars(lines);
    var ci = 0;
    setText(lines, 0);
    function nextChar() {
      ci++;
      setText(lines, ci);
      if (ci < max) {
        setTimeout(nextChar, TYPE_SPEED);
      } else {
        setTimeout(function () { clearPhase(lines); }, PAUSE_AFTER);
      }
    }
    setTimeout(nextChar, TYPE_SPEED);
  }

  function clearPhase(lines) {
    var wrapper = document.createElement('span');
    wrapper.className = 'tw-clearing';
    while (el.firstChild && el.firstChild !== cursor) {
      wrapper.appendChild(el.firstChild);
    }
    el.insertBefore(wrapper, cursor);
    wrapper.addEventListener('animationend', function () {
      while (el.firstChild && el.firstChild !== cursor) {
        el.removeChild(el.firstChild);
      }
      setTimeout(function () { typePhase(pickNext()); }, PAUSE_NEXT);
    });
  }

  setTimeout(function () { typePhase(pickNext()); }, 1200);
})();
</script>

<script>
(function () {
  var token    = localStorage.getItem('token');
  var username = localStorage.getItem('username');
  var loggedIn = !!(token && username);

  // ── Bottom bar ───────────────────────────────────────────
  var bb = document.getElementById('bottom-bar');
  bb.innerHTML = loggedIn
    ? '<a href="/forum.html" class="bottom-link">广 场</a>' +
      '<span class="bottom-sep">·</span>' +
      '<a href="/post.html" class="bottom-link">投 稿</a>'
    : '<a href="/forum.html" class="bottom-link">广 场</a>' +
      '<span class="bottom-sep">·</span>' +
      '<a href="/post.html" class="bottom-link">投 稿</a>' +
      '<span class="bottom-sep">·</span>' +
      '<a href="/login" class="bottom-link">登 录</a>';

  // ── Danmaku area ─────────────────────────────────────────
  var area = document.getElementById('danmaku-area');
  if (loggedIn) {
    area.innerHTML =
      '<div class="danmaku-wrap">' +
        '<input class="danmaku-input" id="danmaku-input" maxlength="40" placeholder="发条弹幕飘过封面…" autocomplete="off">' +
        '<button class="danmaku-send" id="danmaku-btn">发 送</button>' +
      '</div>';
    document.getElementById('danmaku-btn').addEventListener('click', sendDanmaku);
    document.getElementById('danmaku-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendDanmaku();
    });
  } else {
    area.innerHTML =
      '<div class="danmaku-hint">登录后可发送弹幕 · <a href="/login">去登录</a></div>';
  }

  // ── Danmaku engine ────────────────────────────────────────
  var LANES = 8;
  var laneY = [];
  for (var i = 0; i < LANES; i++) {
    laneY.push(Math.round((i + 0.5) * (window.innerHeight / LANES)));
  }
  var laneCooldown = new Array(LANES).fill(0);

  function pickLane() {
    var now = Date.now();
    var best = 0, bestTime = Infinity;
    for (var i = 0; i < LANES; i++) {
      if (laneCooldown[i] < bestTime) { bestTime = laneCooldown[i]; best = i; }
    }
    laneCooldown[best] = now + 1600 + Math.random() * 1200;
    return best;
  }

  function fireDanmaku(text, color) {
    var layer = document.getElementById('danmaku-layer');
    var lane  = pickLane();
    var el    = document.createElement('div');
    el.className   = 'danmaku-item';
    el.textContent = text;
    el.style.color = color || '#c8dff7';
    el.style.top   = laneY[lane] + 'px';
    el.style.left  = '100vw';
    var dur = 7 + Math.random() * 4;
    el.style.animationDuration = dur.toFixed(1) + 's';
    layer.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, (dur + 0.5) * 1000);
  }

  // ── User color (stable per username) ─────────────────────
  var USER_COLORS = ['#c8dff7','#a8e6cf','#f8d7a8','#f4a8c8','#c8b8f0','#a8d8ea','#f0d9a8'];
  function hashStr(s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
    return Math.abs(h);
  }
  function userColor(name) {
    return USER_COLORS[hashStr(name) % USER_COLORS.length];
  }

  // ── Send to backend ───────────────────────────────────────
  function sendDanmaku() {
    var inp = document.getElementById('danmaku-input');
    var btn = document.getElementById('danmaku-btn');
    if (!inp || !btn) return;
    var text = inp.value.trim();
    if (!text) return;
    var col = userColor(username || '');
    btn.disabled = true;
    inp.disabled = true;

    fetch('/api/danmaku', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ content: text, color: col })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        // Show error briefly on placeholder
        inp.placeholder = data.error;
        setTimeout(function() { inp.placeholder = '发条弹幕飘过封面…'; }, 2500);
      } else {
        inp.value = '';
        // Fire locally immediately (don't wait for next poll)
        fireDanmaku((data.display_name || username) + '：' + data.content, col);
      }
    })
    .catch(function() {
      inp.placeholder = '发送失败，请重试';
      setTimeout(function() { inp.placeholder = '发条弹幕飘过封面…'; }, 2000);
    })
    .finally(function() {
      setTimeout(function() {
        btn.disabled = false;
        inp.disabled = false;
        inp.focus();
      }, 2200); // match server-side 5s rate limit (client shows 2.2s)
    });
  }

  // ── Poll backend for danmaku ──────────────────────────────
  var lastId  = 0;   // track highest id seen
  var allRows = [];  // full list loaded on init
  var playIdx = 0;   // playback cursor through allRows
  var PLAY_INTERVAL = 2800; // ms between each item firing

  function loadDanmaku(initial) {
    var url = initial ? '/api/danmaku' : '/api/danmaku?since=' + lastId;
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (!rows || !rows.length) return;
        if (initial) {
          allRows = rows;
          // Update lastId
          lastId = rows[rows.length - 1].id;
          // Start sequential playback
          scheduleNext();
        } else {
          // New rows since last poll — append and update lastId
          rows.forEach(function(row) {
            if (row.id > lastId) {
              lastId = row.id;
              allRows.push(row);
            }
          });
        }
      })
      .catch(function() {});
  }

  function scheduleNext() {
    if (playIdx >= allRows.length) {
      // Exhausted current list — wait and loop from start
      setTimeout(function() {
        playIdx = 0;
        scheduleNext();
      }, PLAY_INTERVAL * 2);
      return;
    }
    var row = allRows[playIdx++];
    var label = (row.display_name || '匿名') + '：' + row.content;
    fireDanmaku(label, row.color);
    setTimeout(scheduleNext, PLAY_INTERVAL + Math.random() * 1200);
  }

  // Initial load
  setTimeout(function() { loadDanmaku(true); }, 1800);

  // Poll for new danmaku every 15s
  setInterval(function() { loadDanmaku(false); }, 15000);

})();
</script>

<script>
(function() {
  const canvas = document.getElementById('rain-canvas');
  const ctx    = canvas.getContext('2d');

  // Drop configuration
  const LAYERS = [
    // [ count, speedMin, speedMax, lengthMin, lengthMax, thicknessMin, thicknessMax, opacityMin, opacityMax, angle ]
    [ 120, 14, 22,  18, 34,  0.5, 1.0,  0.06, 0.18,  -12 ],  // distant — fine, faint
    [  60, 20, 30,  26, 50,  0.7, 1.4,  0.10, 0.25,  -14 ],  // mid
    [  28, 28, 40,  40, 72,  1.0, 1.8,  0.18, 0.38,  -16 ],  // foreground — thick, bright
  ];

  let drops = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initDrops();
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  function initDrops() {
    drops = [];
    LAYERS.forEach(([count, sMin, sMax, lMin, lMax, wMin, wMax, oMin, oMax, ang]) => {
      const rad = ang * Math.PI / 180;
      for (let i = 0; i < count; i++) {
        drops.push({
          x:  rand(-W * 0.1, W * 1.1),
          y:  rand(-H, H),
          speed:   rand(sMin, sMax),
          len:     rand(lMin, lMax),
          width:   rand(wMin, wMax),
          opacity: rand(oMin, oMax),
          rad,
          dx: Math.sin(rad),
          dy: Math.cos(rad),
          // Splash state
          splash: false,
          splashAge: 0,
          splashX: 0,
          splashY: 0,
        });
      }
    });
  }

  function drawSplash(d) {
    const age = d.splashAge / 12;
    const r   = age * 8;
    const o   = (1 - age) * 0.25;
    ctx.save();
    ctx.strokeStyle = `rgba(200,225,245,${o})`;
    ctx.lineWidth   = 0.6;
    ctx.beginPath();
    ctx.ellipse(d.splashX, d.splashY, r * 1.8, r * 0.6, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    d.splashAge++;
    if (d.splashAge > 12) d.splash = false;
  }

  let last = 0;
  function frame(ts) {
    const dt = Math.min((ts - last) / 16.67, 3);
    last = ts;

    ctx.clearRect(0, 0, W, H);

    drops.forEach(d => {
      if (d.splash) { drawSplash(d); return; }

      // Draw streak with gradient fade
      const x0 = d.x;
      const y0 = d.y;
      const x1 = d.x - d.dx * d.len;
      const y1 = d.y - d.dy * d.len;

      const g = ctx.createLinearGradient(x1, y1, x0, y0);
      g.addColorStop(0, `rgba(200,225,248,0)`);
      g.addColorStop(0.6, `rgba(200,225,248,${d.opacity * 0.5})`);
      g.addColorStop(1,   `rgba(210,232,252,${d.opacity})`);

      ctx.save();
      ctx.strokeStyle = g;
      ctx.lineWidth   = d.width;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x0, y0);
      ctx.stroke();
      ctx.restore();

      // Move
      d.x += d.dx * d.speed * dt;
      d.y += d.dy * d.speed * dt;

      // Hit bottom — splash + reset
      if (d.y > H + d.len) {
        if (Math.random() < 0.3) {
          d.splash   = true;
          d.splashAge = 0;
          d.splashX  = d.x;
          d.splashY  = H - 2;
        }
        d.x = rand(-W * 0.15, W * 1.05);
        d.y = rand(-d.len * 3, -d.len);
        d.speed   = rand(d.speed * 0.85, d.speed * 1.15);
        d.opacity = rand(d.opacity * 0.8, d.opacity * 1.2);
      }
    });

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(frame);
})();
</script>
