<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页 · 论坛广场</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/nav-notify.css">
</head>
<body>
<div class="masthead"></div>

<nav class="nav">
  <a href="/index.html" class="nav-logo">风<em class="char-lan">蓝</em>轻音部</a>
  <div class="nav-links">
    <a href="/forum.html" class="nav-link">广 场</a>
    <a href="/qa.html"    class="nav-link">问 答</a>
    <a href="/post.html"  class="nav-link">投 稿</a>
  </div>
  <div id="nav-notify"></div>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="page" id="page">
  <div class="state-msg"><div class="icon">◌</div><div>加载中…</div></div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">编辑个人资料</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">昵称 <span>最多 30 字</span></label>
        <input class="field-input" id="edit-nickname" type="text" maxlength="30" placeholder="你的显示名称">
      </div>
      <div class="field-group">
        <label class="field-label">乐器 <span>输入后按 Enter 添加</span></label>
        <div class="tags-input-wrap" id="tags-wrap" onclick="focusTagInput()">
          <input class="tag-input" id="tag-input" placeholder="如：钢琴、吉他…" maxlength="20">
        </div>
        <div class="field-hint">每种乐器单独添加，点击 × 删除</div>
      </div>
      <div class="field-group" style="margin-bottom:0">
        <label class="field-label">简介 <span>最多 200 字</span></label>
        <textarea class="field-textarea" id="edit-bio" maxlength="200" placeholder="介绍一下你自己…"></textarea>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--rule)">
        <div style="font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:12px">背景图片</div>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
          <div id="modal-banner-preview" style="width:80px;height:44px;border-radius:4px;overflow:hidden;background:linear-gradient(135deg,#1e3a5f,#4a9fd4);flex-shrink:0;border:1px solid var(--rule)">
          </div>
          <div>
            <button type="button" onclick="document.getElementById('modal-banner-input').click()"
              style="padding:6px 14px;background:none;border:1.5px solid var(--rule);border-radius:3px;font-family:inherit;font-size:12px;color:var(--ink-muted);cursor:pointer;transition:all 0.2s"
              onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
              onmouseout="this.style.borderColor='var(--rule)';this.style.color='var(--ink-muted)'">
              选择背景图
            </button>
            <input type="file" id="modal-banner-input" style="display:none" accept="image/jpeg,image/png,image/webp"
              onchange="previewModalBanner(this)">
            <div style="font-size:11px;color:var(--ink-faint);margin-top:5px;font-weight:300">JPG / PNG / WebP · 最大 8MB</div>
          </div>
        </div>
      </div>

      <div style="padding-top:16px;border-top:1px solid var(--rule)">
        <div style="font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:12px">隐私设置</div>
        <div class="toggle-wrap">
          <div class="toggle-label">
            公开关注和粉丝列表
            <small>关闭后其他用户无法查看你的关注与粉丝</small>
          </div>
          <div class="toggle-track" id="toggle-show-follows" onclick="toggleShowFollows()">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="btn-save" onclick="saveProfile()"><span>保存</span></button>
    </div>
  </div>
</div>

<!-- Crop modal -->
<div class="crop-overlay" id="crop-overlay">
  <div class="crop-modal">
    <div class="crop-header">
      <span class="crop-header-title">裁剪头像</span>
      <button class="crop-close" onclick="closeCrop()">×</button>
    </div>
    <div class="crop-canvas-wrap">
      <img id="crop-img" src="" alt="crop">
    </div>
    <div class="crop-footer">
      <span class="crop-hint">拖动调整位置 · 滚轮缩放</span>
      <div class="crop-btns">
        <button class="btn-crop-cancel" onclick="closeCrop()">取消</button>
        <button class="btn-crop-confirm" id="btn-crop-confirm" onclick="confirmCrop()"><span>确认裁剪并上传</span></button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="script/profile.display.js"></script>
<script src="script/profile.edit.js"></script>
<script src="script/nav-notify.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

<script src="script/nav-intercept.js"></script>

</body>
</html>
