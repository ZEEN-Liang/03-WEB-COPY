<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿 · 论坛广场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1814;
    --ink-muted: #5c5850;
    --ink-faint: #a8a49e;
    --paper: #f5f2ec;
    --rule: #d8d3ca;
    --accent: #c0392b;
    --gold: #b8963e;
    --card-bg: #faf8f4;
  }

  html, body {
    min-height: 100%;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(26,24,20,0.03) 28px, rgba(26,24,20,0.03) 29px);
    pointer-events: none; z-index: 0;
  }

  /* ── Nav ── */
  .masthead { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--accent); z-index: 110; }

  .nav {
    position: sticky; top: 4px; z-index: 100;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: stretch;
    padding: 0 48px; height: 56px;
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--ink); text-decoration: none;
    display: flex; align-items: center; margin-right: 36px;
  }
  .nav-logo em { font-style: italic; color: var(--accent); }

  .nav-links { display: flex; align-items: stretch; flex: 1; }

  .nav-link {
    display: flex; align-items: center;
    padding: 0 16px;
    font-size: 13px; font-weight: 400; color: var(--ink-muted);
    text-decoration: none; letter-spacing: 0.04em;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--ink); font-weight: 500; border-bottom-color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }

  .nav-user { font-size: 13px; font-weight: 300; color: var(--ink-muted); }
  .nav-user span { color: var(--ink); font-weight: 500; }

  .nav-logout {
    font-size: 12px; color: var(--ink-faint); background: none;
    border: 1px solid var(--rule); border-radius: 3px;
    padding: 5px 12px; cursor: pointer; font-family: inherit;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-logout:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Layout ── */
  .page {
    position: relative; z-index: 1;
    max-width: 760px; margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .page-header { margin-bottom: 40px; }
  .page-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px; font-weight: 600; margin-bottom: 6px;
  }
  .page-sub {
    font-size: 13px; font-weight: 300; color: var(--ink-muted);
  }

  .divider { width: 40px; height: 2px; background: var(--accent); margin: 16px 0 0; }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 36px 40px;
    margin-bottom: 24px;
  }

  .card-title {
    font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  /* ── Fields ── */
  .field-group { margin-bottom: 24px; }
  .field-label {
    display: flex; justify-content: space-between;
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px;
  }
  .field-label .char-count { font-weight: 300; letter-spacing: 0; text-transform: none; color: var(--ink-faint); }

  .field-input, .field-textarea {
    width: 100%; padding: 11px 14px;
    background: #fff; border: 1.5px solid var(--rule); border-radius: 3px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 300;
    color: var(--ink); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field-input::placeholder, .field-textarea::placeholder { color: var(--ink-faint); }
  .field-input:focus, .field-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
  }
  .field-textarea { resize: vertical; min-height: 160px; line-height: 1.8; }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--rule); border-radius: 6px;
    padding: 32px 24px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #fff; position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(192,57,43,0.03);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    width: 40px; height: 40px; margin: 0 auto 12px;
    border: 1.5px solid var(--rule); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-size: 18px;
  }
  .upload-title { font-size: 14px; font-weight: 400; color: var(--ink-muted); margin-bottom: 4px; }
  .upload-hint { font-size: 12px; font-weight: 300; color: var(--ink-faint); }
  .upload-hint strong { color: var(--accent); font-weight: 500; }

  /* ── File list ── */
  .file-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

  .file-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: #fff;
    border: 1px solid var(--rule); border-radius: 4px;
    animation: fadeUp 0.2s ease;
  }

  .file-icon {
    width: 32px; height: 32px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    background: var(--paper);
  }
  .file-icon.image { background: #fff3f0; color: var(--accent); }
  .file-icon.text  { background: #f0f4ff; color: #4a6fa5; }

  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 400; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }

  /* Image preview inside file item */
  .file-thumb {
    width: 40px; height: 40px; object-fit: cover;
    border-radius: 3px; flex-shrink: 0;
    border: 1px solid var(--rule);
  }

  .file-remove {
    background: none; border: none; cursor: pointer;
    color: var(--ink-faint); font-size: 16px; padding: 2px 6px;
    border-radius: 3px; transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .file-remove:hover { color: var(--accent); background: rgba(192,57,43,0.06); }

  /* ── Submit button ── */
  .submit-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 8px; }
  .submit-hint { font-size: 12px; font-weight: 300; color: var(--ink-faint); }

  .btn-submit {
    padding: 12px 36px; background: var(--ink); color: #f5f2ec;
    border: none; border-radius: 3px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: 0.08em; cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.1s; white-space: nowrap;
  }
  .btn-submit::before {
    content: ''; position: absolute; inset: 0; background: var(--accent);
    transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease;
  }
  .btn-submit:hover::before { transform: scaleX(1); }
  .btn-submit span { position: relative; z-index: 1; }
  .btn-submit:active { transform: scale(0.985); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-submit.loading span { opacity: 0; }
  .btn-submit.loading::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 18px; height: 18px;
    border: 2px solid rgba(245,242,236,0.3); border-top-color: #f5f2ec;
    border-radius: 50%; animation: spin 0.7s linear infinite; z-index: 2;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px);
    padding: 12px 24px; border-radius: 4px; font-size: 13px;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #1a1814; color: #f5f2ec; }
  .toast.error   { background: #922b21; color: #fff; }

  /* ── Success state ── */
  .success-panel {
    display: none; text-align: center; padding: 60px 40px;
    animation: fadeUp 0.4s ease;
  }
  .success-panel.show { display: block; }
  .success-mark { font-size: 36px; margin-bottom: 20px; }
  .success-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .success-sub { font-size: 13px; font-weight: 300; color: var(--ink-muted); margin-bottom: 32px; }
  .btn-again {
    padding: 10px 28px; background: none; border: 1.5px solid var(--rule);
    border-radius: 3px; font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; color: var(--ink-muted); cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-again:hover { border-color: var(--accent); color: var(--accent); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  @media (max-width: 600px) {
    .nav { padding: 0 20px; }
    .page { padding: 32px 16px 60px; }
    .card { padding: 24px 20px; }
    .submit-row { flex-direction: column; align-items: stretch; }
    .btn-submit { text-align: center; }
  }
</style>
</head>
<body>

<div class="masthead"></div>
<!-- Nav -->
<nav class="nav">
  <a href="/forum.html" class="nav-logo">论<em>坛</em>广场</a>
  <div class="nav-links">
    <a href="/forum.html" class="nav-link">广 场</a>
    <a href="/post.html" class="nav-link active">投 稿</a>
  </div>
  <div class="nav-right">
    <div class="nav-user">你好，<span id="nav-username"></span></div>
    <a href="/profile.html" class="nav-btn" style="font-size:12px;padding:5px 12px;border:1px solid var(--rule);border-radius:3px;color:var(--ink-muted);text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--rule)';this.style.color='var(--ink-muted)'">我的主页</a>
    <button class="nav-logout" onclick="logout()">退出登录</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">发布投稿</div>
    <div class="page-sub">写下你的想法，附上图片或文件，与社区分享</div>
    <div class="divider"></div>
  </div>

  <!-- Form -->
  <div id="form-area">

    <!-- 基本信息 -->
    <div class="card">
      <div class="card-title">基本信息</div>

      <div class="field-group">
        <div class="field-label">
          <span>标题</span>
          <span class="char-count"><span id="title-count">0</span> / 100</span>
        </div>
        <input class="field-input" type="text" id="post-title" maxlength="100"
               placeholder="用一句话概括你的投稿内容" oninput="updateCount()">
      </div>

      <div class="field-group" style="margin-bottom:0">
        <div class="field-label"><span>正文内容</span><span class="char-count">可选</span></div>
        <textarea class="field-textarea" id="post-content"
                  placeholder="详细描述你的想法，支持换行排版..."></textarea>
      </div>
    </div>

    <!-- 附件 -->
    <div class="card">
      <div class="card-title">附件上传 <span style="font-weight:300;text-transform:none;letter-spacing:0;color:var(--ink-faint)">— 最多 20 个文件，每个不超过 50MB</span></div>

      <div class="upload-zone" id="upload-zone"
           ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" id="file-input" multiple
               accept="image/*,.txt,.md,.pdf,.zip,.rar,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.mp3,.wav,.flac,.aac,.ogg,.mp4,.webm"
               onchange="onFileSelect(event)">
        <div class="upload-icon">＋</div>
        <div class="upload-title">点击选择文件，或拖拽到此处</div>
        <div class="upload-hint">
          图片 <strong>JPG · PNG · GIF · WebP</strong> &nbsp;·&nbsp;
          文档 <strong>PDF · DOC · XLS · PPT</strong> &nbsp;·&nbsp;
          压缩 <strong>ZIP · RAR</strong> &nbsp;·&nbsp;
          音频 <strong>MP3 · WAV · FLAC</strong> &nbsp;·&nbsp;
          视频 <strong>MP4 · WebM</strong> &nbsp;·&nbsp;
          文本 <strong>TXT · MD</strong>
        </div>
      </div>

      <div class="file-list" id="file-list"></div>
    </div>

    <!-- 提交 -->
    <div class="submit-row">
      <div class="submit-hint">投稿后将对所有用户公开展示</div>
      <button class="btn-submit" id="btn-submit" onclick="submitPost()">
        <span>发布投稿</span>
      </button>
    </div>

  </div>

  <!-- 成功 -->
  <div class="card success-panel" id="success-panel">
    <div class="success-mark">✦</div>
    <div class="success-title">投稿已发布</div>
    <div class="success-sub">你的内容已成功提交，感谢分享</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn-again" onclick="resetForm()">继续投稿</button>
      <a href="/forum.html" class="btn-again" style="text-decoration:none">去广场看看 →</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Auth guard ──────────────────────────────────────────────
const token    = localStorage.getItem('token');
const username = localStorage.getItem('username');

if (!token || !username) {
  // Not logged in → redirect to login
  window.location.href = '/';
}

document.getElementById('nav-username').textContent = username;

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  window.location.href = '/';
}

// ── Character counter ───────────────────────────────────────
function updateCount() {
  const len = document.getElementById('post-title').value.length;
  document.getElementById('title-count').textContent = len;
}

// ── File handling ───────────────────────────────────────────
let selectedFiles = [];

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function isImage(file) {
  return file.type.startsWith('image/');
}

// File type groups for icon display
const FILE_ICONS = {
  image:    { types: ['image/jpeg','image/png','image/gif','image/webp'],                           label: 'IMG',  color: '#c0392b' },
  pdf:      { types: ['application/pdf'],                                                            label: 'PDF',  color: '#e74c3c' },
  zip:      { types: ['application/zip','application/x-zip-compressed','application/x-rar-compressed','application/vnd.rar'], label: 'ZIP', color: '#8e44ad' },
  word:     { types: ['application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document'], label: 'DOC', color: '#2980b9' },
  excel:    { types: ['application/vnd.ms-excel','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'], label: 'XLS', color: '#27ae60' },
  ppt:      { types: ['application/vnd.ms-powerpoint','application/vnd.openxmlformats-officedocument.presentationml.presentation'], label: 'PPT', color: '#e67e22' },
  audio:    { types: ['audio/mpeg','audio/wav','audio/ogg','audio/flac','audio/aac'],               label: 'AUD',  color: '#16a085' },
  video:    { types: ['video/mp4','video/webm','video/ogg'],                                        label: 'VID',  color: '#2c3e50' },
  text:     { types: ['text/plain','text/markdown'],                                                 label: 'TXT',  color: '#4a6fa5' },
};

const ALLOWED_TYPES = Object.values(FILE_ICONS).flatMap(g => g.types);

function getFileIcon(file) {
  for (const [, g] of Object.entries(FILE_ICONS)) {
    if (g.types.includes(file.type) || (file.type === '' && file.name.match(/\.(md|zip|rar)$/i))) {
      return g;
    }
  }
  // Fallback: guess from extension
  const ext = file.name.split('.').pop().toLowerCase();
  const extMap = { pdf:'PDF', zip:'ZIP', rar:'RAR', doc:'DOC', docx:'DOC', xls:'XLS', xlsx:'XLS', ppt:'PPT', pptx:'PPT', mp3:'AUD', wav:'AUD', flac:'AUD', aac:'AUD', mp4:'VID', webm:'VID', txt:'TXT', md:'TXT' };
  return { label: extMap[ext] || ext.toUpperCase().slice(0,4) || 'FILE', color: '#888' };
}

function addFiles(newFiles) {
  for (const f of newFiles) {
    if (selectedFiles.length >= 20) { showToast('最多只能上传 20 个文件', 'error'); break; }
    const ext = f.name.split('.').pop().toLowerCase();
    const knownExt = ['jpg','jpeg','png','gif','webp','txt','md','pdf','zip','rar','doc','docx','xls','xlsx','ppt','pptx','mp3','wav','flac','aac','ogg','mp4','webm'].includes(ext);
    if (!ALLOWED_TYPES.includes(f.type) && !knownExt) {
      showToast(`"${f.name}" 格式不支持`, 'error'); continue;
    }
    if (f.size > 50 * 1024 * 1024) {
      showToast(`"${f.name}" 超过 50MB 限制`, 'error'); continue;
    }
    if (selectedFiles.find(x => x.name === f.name && x.size === f.size)) {
      showToast(`"${f.name}" 已添加`, 'error'); continue;
    }
    selectedFiles.push(f);
  }
  renderFileList();
}

function renderFileList() {
  const list = document.getElementById('file-list');
  list.innerHTML = '';

  selectedFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';

    if (isImage(f)) {
      const reader = new FileReader();
      reader.onload = e => {
        const thumb = document.createElement('img');
        thumb.className = 'file-thumb';
        thumb.src = e.target.result;
        item.insertBefore(thumb, item.firstChild);
      };
      reader.readAsDataURL(f);
    } else {
      const ico = getFileIcon(f);
      const icon = document.createElement('div');
      icon.className = 'file-icon';
      icon.style.cssText = `background:${ico.color}18;color:${ico.color};border-color:${ico.color}40;font-size:10px;font-weight:700;letter-spacing:0.04em`;
      icon.textContent = ico.label;
      item.appendChild(icon);
    }

    item.innerHTML += `
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-size">${formatSize(f.size)}</div>
      </div>
      <button class="file-remove" onclick="removeFile(${i})" title="移除">×</button>
    `;
    list.appendChild(item);
  });
}

function removeFile(i) {
  selectedFiles.splice(i, 1);
  renderFileList();
}

function onFileSelect(e) {
  addFiles(Array.from(e.target.files));
  e.target.value = ''; // reset so same file can be re-added
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('dragover');
}

function onDragLeave() {
  document.getElementById('upload-zone').classList.remove('dragover');
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('dragover');
  addFiles(Array.from(e.dataTransfer.files));
}

// ── Submit ──────────────────────────────────────────────────
async function submitPost() {
  const title   = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const btn     = document.getElementById('btn-submit');

  if (!title) { showToast('请填写标题', 'error'); return; }

  const formData = new FormData();
  formData.append('title', title);
  formData.append('content', content);
  selectedFiles.forEach(f => formData.append('files', f));

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: formData
    });
    const data = await res.json();
    if (!res.ok) {
      showToast(data.error || '投稿失败', 'error');
    } else {
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('success-panel').classList.add('show');
    }
  } catch (e) {
    showToast('无法连接服务器', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function resetForm() {
  document.getElementById('post-title').value = '';
  document.getElementById('post-content').value = '';
  document.getElementById('title-count').textContent = '0';
  selectedFiles = [];
  renderFileList();
  document.getElementById('form-area').style.display = 'block';
  document.getElementById('success-panel').classList.remove('show');
}

// ── Toast ───────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
