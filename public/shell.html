<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风蓝轻音部</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shell.css">
</head>
<body>

<!-- Persistent background (survives page navigation) -->
<div class="bg">
  <img class="bg-img" src="/images/cover-bg.png" alt="" draggable="false">
</div>

<!-- Ambient orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Rain: bg + mid behind iframe, fg in front -->
<canvas id="rain-bg"></canvas>
<canvas id="rain-mid"></canvas>

<!-- iframe: all page content lives here -->
<iframe id="content-frame" name="content"></iframe>

<!-- Foreground rain — floats above page content for depth -->
<canvas id="rain-fg"></canvas>


<script src="/player.js"></script>
<script src="/script/rain-engine.js"></script>
<script>
startRain({
  canvasIds:   ['rain-bg', 'rain-mid', 'rain-fg'],
  opacityMult: 0.65,
  timeStop:    true,
  mouseEffect: true,
  exitAnim:    false,
  pauseEffect: true,
  volEffect:   true,
});
</script>
<script src="/script/shell.router.js"></script>
</body>
</html>
