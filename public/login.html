<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 风蓝轻音部</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="masthead"></div>
<div class="layout">
  <a href="/" class="left-panel" title="返回封面，不登录继续浏览">
    <div class="publication-name">风<em class="char-lan">蓝</em><br>轻音部</div>
    <div class="tagline">Community · Forum · Exchange</div>
    <div class="divider-line"></div>
    <div class="feature-items">
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">上传文章、文本与图片，与社区共享你的观点与创作</div></div>
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">参与讨论，结识志同道合的读者与作者</div></div>
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">关注感兴趣的用户，打造属于你的阅读圈子</div></div>
    </div>
    <div class="vol-info">风蓝轻音部 &nbsp;·&nbsp; 一个个瞬间积累起来就是一辈子</div>
    <div class="back-hint">← 点击返回封面，不登录继续浏览</div>
  </a>
  <div class="right-panel">
    <div class="form-card">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">登 录</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">注 册</button>
      </div>
      <div class="form-section active" id="section-login">
        <div class="form-title">欢迎回来</div>
        <div class="form-subtitle">登录以继续阅读与发布内容</div>
        <div class="field-group">
          <label class="field-label" for="login-account">账号</label>
          <input class="field-input" type="text" id="login-account" placeholder="邮箱或用户名" autocomplete="username">
        </div>
        <div class="field-group">
          <label class="field-label" for="login-password">密码</label>
          <input class="field-input" type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="field-meta">
          <label class="remember-label"><input type="checkbox" class="remember-check" id="remember"> 记住我</label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>
        <button class="btn-primary" id="btn-login" onclick="handleLogin()"><span>登 录</span></button>
        <div class="toast" id="toast-login"></div>
      </div>
      <div class="form-section" id="section-register">
        <div class="form-title">创建账户</div>
        <div class="form-subtitle">加入社区，开始你的第一篇发布</div>
        <div class="field-group">
          <label class="field-label" for="reg-username">用户名</label>
          <input class="field-input" type="text" id="reg-username" placeholder="3–16 位，字母数字下划线" autocomplete="username">
        </div>
        <div class="field-group">
          <label class="field-label" for="reg-email">邮箱</label>
          <input class="field-input" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-label" for="reg-password">密码</label>
          <input class="field-input" type="password" id="reg-password" placeholder="至少 8 位" autocomplete="new-password">
        </div>
        <div class="field-group">
          <label class="field-label" for="reg-confirm">确认密码</label>
          <input class="field-input" type="password" id="reg-confirm" placeholder="再次输入密码" autocomplete="new-password">
        </div>
        <div class="terms-row">
          <input type="checkbox" class="terms-check" id="terms-check">
          <div class="terms-text">我已阅读并同意 <a href="#">服务条款</a> 与 <a href="#">隐私政策</a></div>
        </div>
        <button class="btn-primary" id="btn-register" onclick="handleRegister()"><span>注 册</span></button>
        <div class="toast" id="toast-register"></div>
      </div>
    </div>
  </div>
</div>
<script src="script/login.auth.js"></script>
<script src="script/nav-intercept.js"></script>
</body>
</html>
